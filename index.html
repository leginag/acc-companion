  view.exam.screen = 'run';
  render();
  window.scrollTo(0, 0);
}
function finishMock() {
  var a = db.exam.active;
  if (!a) return;
  var correct = 0, byD = { eth: { n: 0, ok: 0 }, bnd: { n: 0, ok: 0 }, cmp: { n: 0, ok: 0 } };
  a.qids.forEach(function (id) {
    var q = examQ(id);
    if (!q) return;
    var ok = a.answers[id] === q.ans;
    if (ok) correct++;
    byD[q.d].n++;
    if (ok) byD[q.d].ok++;
    var s = db.exam.stats[id] || { seen: 0, ok: 0, last: null };
    s.seen++; if (ok) s.ok++; s.last = todayKey();
    db.exam.stats[id] = s;
  });
  var attempt = {
    id: uid(), mode: 'mock', timed: a.timed, startedAt: a.startedAt, finishedAt: Date.now(),
    qids: a.qids, answers: a.answers, flags: a.flags, correct: correct, byDomain: byD,
    scaled: Math.round(200 + correct / 60 * 400)
  };
  db.exam.attempts.push(attempt);
  if (db.exam.attempts.length > 100) db.exam.attempts = db.exam.attempts.slice(-100);
  db.exam.active = null;
  save();
  view.exam.reviewAttempt = attempt.id;
  view.exam.reviewIdx = 0;
  view.exam.screen = 'results';
  render();
  window.scrollTo(0, 0);
}
function attemptById(id) { for (var i = 0; i < db.exam.attempts.length; i++) if (db.exam.attempts[i].id === id) return db.exam.attempts[i]; return null; }

// drill
function startDrill(domain) {
  var d = domain === 'weak' ? weakestDomain() : domain;
  var pool = shuffle(EXAM_BANK.filter(function (q) { return q.d === d; }));
  pool.sort(function (a, b) { var x = lastSeenKey(a), y = lastSeenKey(b); return x < y ? -1 : x > y ? 1 : 0; });
  view.exam.drill = { qids: pool.slice(0, 12).map(function (q) { return q.id; }), idx: 0, answers: {}, revealed: false, domain: d, ok: 0 };
  view.exam.screen = 'drill';
  render();
  window.scrollTo(0, 0);
}

    '<div class="f-warn">Your <strong>exam</strong> tests the <strong>2020</strong> Code of Ethics. Your <strong>practice</strong> (and your recording) follows the <strong>2025</strong> Code, in force since 1 April 2025. The principles below hold in both; the 2025 Code restructures them into 5 sections and 24 standards.</div>';
  var rows = [
    ['Confidentiality', 'Maintain the strictest confidentiality with all parties. Agree up front what may be shared with a sponsor.'],
    ['Limits of confidentiality', 'May disclose where required by law (court order/subpoena), for illegal activity, or imminent risk of harm to self or others — ideally pre-agreed in the coaching agreement.'],
    ['Records & data', 'Create, store and dispose of records securely and lawfully, protecting privacy.'],
    ['Conflicts of interest', 'Stay alert to actual and potential conflicts; disclose and work them through — adjust or end the relationship if needed.'],
    ['Boundaries', 'Set clear, culturally sensitive boundaries. No romantic or sexual involvement with clients or sponsors.'],
    ['Role clarity', 'Disclose when stepping out of the coaching role into another capacity (e.g., consultant, trainer).'],
    ['Referral fees', 'Disclose any compensation paid or received for referrals.'],
    ['Honesty about qualifications', 'Represent your credentials, training and ICF level accurately; make only truthful claims about what you offer.'],
    ['Recognising limits / referral', 'Work within your competence; refer to other professionals when the need exceeds coaching (e.g., clinical concerns).'],
    ['Doing good', 'Adhere to “doing good” over merely “avoiding bad” — act with integrity and consider wider impact.']

}

function pillFor(sess, client) {
  var h = '<span class="pill ' + (sess.paid ? 'paid">Paid' : 'pro">Pro bono') + '</span>';
  if (client && client.kind === 'grp') h += '<span class="pill peer">Group·' + client.size + '</span>';
  if (client && client.peer) h += '<span class="pill peer">Peer</span>';
  if (sessionBlockers(sess, client).length) h += '<span class="pill warn">Not counted</span>';
  return h;
}

function vHours() {
  var st = hourStats();
  var ms = mentorStats();
  var h = '<h1 class="view-title">Hours</h1>' +
    '<p class="view-sub">ICF ACC experience log — 100 h, at least 75 paid, 8+ clients, 25 h in the 18 months before you apply. All of it lives only on this device.</p>';

  // hero + tiles
  h += '<section class="hero card">' + ring(st.counted / 6000, 64, 7) +
    '<div><div class="sum-big">' + fmtH(st.counted) + ' of 100 h</div>' +
    '<div class="sub">count toward ACC' + (st.counted >= 6000 ? ' — requirement met 🎉' : '') + '</div></div></section>';

  var winSub = db.settings.targetApply
    ? '18 mo before ' + fmtD2(st.anchor)
    : 'last 18 months (set a target date in Setup)';
  h += '<div class="tiles2">' +
    tile(fmtH(st.paidMin) + '<small>/75 h</small>', 'Paid', 'barter & peer count as paid', st.paidMin >= 4500, st.paidMin / 4500) +
    tile(fmtH(st.proCounted) + '<small>/25 h</small>', 'Pro bono', st.proMin > 25 * 60 ? fmtH(st.proMin) + ' h logged — 25 h cap' : 'max 25 h can count', st.proCounted >= 1500 || (st.counted >= 6000), st.proCounted / 1500, 'p2f') +
    tile(st.clientN + '<small>/8</small>', 'Clients', 'group members each count', st.clientN >= 8, st.clientN / 8) +
    tile(fmtH(st.winMin) + '<small>/25 h</small>', 'Recent', winSub, st.winMin >= 1500, st.winMin / 1500) +
    '</div>';

  st.warnings.forEach(function (w) { h += '<div class="f-warn">' + w + '</div>'; });

  // sessions
  h += '<div class="h-label">Sessions</div>';
  h += '<button class="btn btn-primary btn-add" data-act="add-session" style="margin-top:0">' + SVG_PLUS + ' Log a session</button>';
  var sess = db.sessions.slice().sort(function (a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
  if (sess.length) {
    var shown = view.hours.showAllSessions ? sess : sess.slice(0, 8);
    h += '<div class="rows" style="margin-top:10px">' + shown.map(function (s) {
      var c = clientById(s.clientId);
      return '<button class="mrow card" data-act="edit-session" data-id="' + s.id + '">' +
        '<span class="mrow-mid"><span class="mrow-name">' + esc(c ? c.name : '—') + '</span>' +
        '<span class="sub">' + fmtD2(s.date) + ' · ' + fmtDur(s.min) + (s.note ? ' · ' + esc(s.note) : '') + '</span></span>' +
        '<span class="pillrow">' + pillFor(s, c) + '</span>' +
        '</button>';
    }).join('') + '</div>';
    if (sess.length > 8) {
      h += '<button class="btn btn-ghost btn-add" data-act="toggle-sessions">' +
        (view.hours.showAllSessions ? 'Show fewer' : 'Show all ' + sess.length + ' sessions') + '</button>';
    }
  } else {
    h += '<div class="card empty" style="margin-top:10px"><p>No sessions yet. Log each real coaching session — date, client and minutes. 30 minutes counts as 0.5 h.</p></div>';
  }

  // clients
  h += '<div class="h-label">Clients</div>';
  if (db.clients.length) {
    var shownC = view.hours.showAllClients ? db.clients : db.clients.slice(0, 8);
    h += '<div class="rows">' + shownC.map(function (c) {
      var min = st.perClient[c.id] || 0;
      var kindL = c.kind === 'grp' ? 'Group of ' + c.size : 'Individual';
      return '<button class="mrow card" data-act="edit-client" data-id="' + c.id + '">' +
        '<span class="mrow-mid"><span class="mrow-name">' + esc(c.name) + '</span>' +
        '<span class="sub">' + kindL + (c.peer ? ' · peer' : '') + ' · ' + fmtH(min) + ' h counted' + (c.end ? ' · ended ' + fmtD2(c.end) : '') + '</span></span>' +
        SVG_PEN + '</button>';
    }).join('') + '</div>';
    if (db.clients.length > 8) {
      h += '<button class="btn btn-ghost btn-add" data-act="toggle-clients">' +
        (view.hours.showAllClients ? 'Show fewer' : 'Show all ' + db.clients.length + ' clients') + '</button>';
    }
  }
  h += '<button class="btn btn-surface btn-add" data-act="add-client">' + SVG_PLUS + ' Add a client</button>';

  // mentor coaching
  h += '<div class="h-label">Mentor coaching</div>';
  h += '<div class="card" style="padding:13px 14px">' +
    '<div class="dombar"><span class="dombar-l">Total</span><div class="bar"><i style="width:' + Math.min(100, Math.round(ms.min / 600 * 100)) + '%"></i></div><span class="dombar-v">' + fmtH(ms.min) + '/10 h</span></div>' +
    '<div class="dombar"><span class="dombar-l">One-on-one</span><div class="bar"><i style="width:' + Math.min(100, Math.round(ms.soloMin / 180 * 100)) + '%"></i></div><span class="dombar-v">' + fmtH(ms.soloMin) + '/3 h</span></div>' +
    '<div class="dombar"><span class="dombar-l">Over 3 months</span><div class="bar"><i style="width:' + (ms.spanOk ? 100 : 0) + '%"></i></div><span class="dombar-v">' + (ms.spanOk ? 'yes' : (ms.first ? 'not yet' : '—')) + '</span></div>' +
    '<p class="note" style="margin:10px 0 0">Your Level 1 programme includes this — log it anyway for your records. 10 h over ≥3 months, ≥3 h one-on-one, groups of 10 or fewer.</p>' +
    '</div>';
  if (db.mentor.length) {
    h += '<div class="rows" style="margin-top:10px">' + db.mentor.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; }).map(function (m) {
      return '<button class="mrow card" data-act="edit-mentor" data-id="' + m.id + '">' +
        '<span class="mrow-mid"><span class="mrow-name">' + (m.solo ? 'One-on-one' : 'Group') + (m.mentorName ? ' · ' + esc(m.mentorName) : '') + '</span>' +
        '<span class="sub">' + fmtD2(m.date) + ' · ' + fmtDur(m.min) + '</span></span>' +
        SVG_PEN + '</button>';
    }).join('') + '</div>';
  }
  h += '<button class="btn btn-surface btn-add" data-act="add-mentor">' + SVG_PLUS + ' Log mentor coaching</button>';

  // data
  h += '<div class="h-label">Your data</div>';
  var stale = db.sessions.length && (!db.settings.lastBackup || db.settings.lastBackup < addDays(todayKey(), -14));
  if (stale) h += '<div class="f-warn">You have unsaved-anywhere data — download a backup now and then (especially on iPhone, where the browser can clear storage after long disuse).</div>';
  h += '<div class="data-grid">' +
    '<button class="btn btn-surface" data-act="export-log">ICF client log (CSV)</button>' +
    '<button class="btn btn-surface" data-act="export-sessions">Sessions CSV</button>' +
    '<button class="btn btn-surface" data-act="export-json">Download backup</button>' +
    '<button class="btn btn-surface" data-act="pick-import">Restore backup</button>' +
    '</div>';
  h += '<p class="note">The client log matches ICF’s template columns. You never upload it — at application you attest your totals and keep the log as your own record.</p>';
  if (view.importErr) h += '<div class="f-err">' + esc(view.importErr) + '</div>';
  if (view.pendingImport) {
    var p = view.pendingImport;
    h += '<div class="card confirm-import">' +
      '<p>This backup has <strong>' + p.clients.length + '</strong> clients, <strong>' + p.sessions.length + '</strong> sessions and <strong>' +
      p.exam.attempts.length + '</strong> exam attempts. Restoring replaces everything currently here.</p>' +
      '<div class="confirm-actions">' +
      '<button class="btn btn-ghost" data-act="cancel-import">Cancel</button>' +
      '<button class="btn btn-primary" data-act="confirm-import">Restore</button>' +
      '</div></div>';
  }

  // setup
  h += '<div class="h-label">Setup</div><div class="setup card">' +
    '<div class="srow"><div class="srow-l">Training start<span class="sub">hours before this can’t count</span></div>' +
    '<input type="date" class="f-input compact" data-role="set-training" value="' + (db.settings.trainingStart || '') + '"></div>' +
    '<div class="srow"><div class="srow-l">Target application<span class="sub">anchors the 18-month window</span></div>' +
    '<input type="date" class="f-input compact" data-role="set-target" value="' + (db.settings.targetApply || '') + '"></div>' +
    '<div class="srow"><div class="srow-l">ICF member<span class="sub">fee $175 vs $325</span></div>' +
    miniSeg([['yes', 'Yes'], ['no', 'No']], 'set-member', db.settings.icfMember) + '</div>' +
    '<div class="srow"><div class="srow-l">Theme</div>' +
    miniSeg([['auto', 'Auto'], ['light', 'Light'], ['dark', 'Dark']], 'set-theme', db.settings.theme) + '</div>' +
    '</div>';

  h += '<p class="note">Everything stays in this browser on this device — client names are never sent anywhere.</p>';
  h += '<div class="erase-wrap"><button class="btn btn-danger' + (view.confirmErase ? ' armed' : '') + '" data-act="erase">' +
    (view.confirmErase ? 'Tap again to erase everything' : 'Erase all data') + '</button></div>';

  return h;
}

/* ── sheets ──────────────────────────────────────────────────────────── */
var SHEETS = {};
var SHEET_SYNC = {};

function syncSheet() {
  var s = view.sheet;
  if (s && SHEET_SYNC[s.type]) SHEET_SYNC[s.type](s);
}
function gv(id) { var el = document.getElementById(id); return el ? el.value : null; }
function gc(id) { var el = document.getElementById(id); return el ? !!el.checked : false; }

SHEET_SYNC.client = function (s) {
  if (gv('f-name') !== null) s.name = gv('f-name');
  if (gv('f-contact') !== null) s.contact = gv('f-contact');
  if (gv('f-size') !== null) s.size = gv('f-size');
  var p = document.getElementById('f-peer');
  if (p) s.peer = p.checked;
  if (gv('f-start') !== null) s.start = gv('f-start');
  if (gv('f-end') !== null) s.end = gv('f-end');
  if (gv('f-notes') !== null) s.notes = gv('f-notes');
};
SHEET_SYNC.session = function (s) {
  if (gv('f-sclient') !== null) s.clientId = gv('f-sclient');
  if (gv('f-sdate') !== null) s.date = gv('f-sdate');
  if (gv('f-smin') !== null) s.min = gv('f-smin');
  if (gv('f-snote') !== null) s.note = gv('f-snote');
};
SHEET_SYNC.mentor = function (s) {
  if (gv('f-mdate') !== null) s.date = gv('f-mdate');
  if (gv('f-mmin') !== null) s.min = gv('f-mmin');
  if (gv('f-mname') !== null) s.mentorName = gv('f-mname');
  if (gv('f-mnote') !== null) s.note = gv('f-mnote');
};

  var isGrp = s.kind === 'grp';
  var sizeN = clampInt(s.size, 0, 999, 0);
  return '<h2>' + (s.id ? 'Edit client' : 'New client') + '</h2>' +
    '<label class="f-label" for="f-name">' + (isGrp ? 'Group name' : 'Client name') + '</label>' +
    '<input class="f-input" id="f-name" maxlength="60" value="' + esc(s.name) + '" placeholder="' + (isGrp ? 'e.g. Leadership cohort B' : 'e.g. Amina K.') + '" autocomplete="off">' +
    (s.err ? '<div class="f-err">' + esc(s.err) + '</div>' : '') +
    '<label class="f-label" for="f-contact">Contact (email or phone)</label>' +
    '<input class="f-input" id="f-contact" maxlength="80" value="' + esc(s.contact) + '" placeholder="' + (isGrp ? 'one participant’s email' : 'their email or phone') + '" autocomplete="off">' +
    '<div class="f-label">Type</div>' +
    miniSeg([['ind', 'Individual'], ['grp', 'Group']], 'c-kind', s.kind) +
    (isGrp
      ? '<label class="f-label" for="f-size">People in the group</label>' +
        '<input class="f-input num" id="f-size" inputmode="numeric" pattern="[0-9]*" maxlength="2" value="' + esc(s.size) + '">' +
        (sizeN > 15 ? '<div class="f-warn">Groups over 15 don’t count toward ICF hours (unless co-coached — then log only your share of the time).</div>'
          : '<p class="note">Each participant counts as a client. The session time counts once, not per person. Co-coaching? Log only your share of the time.</p>')
      : '') +
    '<label class="addmiss"><input type="checkbox" id="f-peer"' + (s.peer ? ' checked' : '') + '>' +
    '<span><strong>Peer coach</strong> (fellow trainee or coach). Reciprocal coach-to-coach coaching counts as <strong>paid</strong> (barter). Classroom practice inside the programme doesn’t count at all — log only real sessions outside it.</span></label>' +
    '<div class="num-grid"><div>' +
    '<label class="f-label" for="f-start">Relationship start</label>' +
    '<input type="date" class="f-input" id="f-start" value="' + esc(s.start) + '">' +
    '</div><div>' +
    '<label class="f-label" for="f-end">End (blank = ongoing)</label>' +
    '<input type="date" class="f-input" id="f-end" value="' + esc(s.end || '') + '">' +
    '</div></div>' +
    '<label class="f-label" for="f-notes">Notes (optional)</label>' +
    '<input class="f-input" id="f-notes" maxlength="400" value="' + esc(s.notes) + '" autocomplete="off">' +
    '<div class="sheet-actions">' +

/* ── render ──────────────────────────────────────────────────────────── */
var tickTimer = null;
function updateClock() {
  var a = db.exam.active;
  var el = document.getElementById('clock');
  if (!el || !a) return;
  var end = view.exam.screen === 'break' ? a.breakEndsAt : a.secEndsAt;
  if (!end) { el.textContent = '—'; return; }
  var rem = end - Date.now();
  el.textContent = fmtClock(rem);
  el.classList.toggle('low', view.exam.screen === 'run' && rem <= 5 * 60 * 1000);
}
function tickNow() {
  var a = db.exam.active;
  if (!a) { maybeTick(); return; }
  if (view.exam.screen === 'run' && a.timed && a.secEndsAt && Date.now() >= a.secEndsAt) { submitSection(true); return; }
  updateClock();
}
function maybeTick() {
  var a = db.exam.active;
  var live = a && a.timed && view.tab === 'exam' && (view.exam.screen === 'run' || view.exam.screen === 'break');
  if (live && !tickTimer) tickTimer = setInterval(tickNow, 500);
  else if (!live && tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  if (live) updateClock();
}
function render() {
  renderedToday = todayKey();
  document.getElementById('view').innerHTML =
    view.tab === 'learn' ? vLearn() :
    view.tab === 'practise' ? vPractise() :
    view.tab === 'skills' ? vSkills() :
    view.tab === 'exam' ? vExam() :
    view.tab === 'hours' ? vHours() : vRunway();
  document.getElementById('sheet-root').innerHTML = vSheet();
  document.documentElement.classList.toggle('locked', !!view.sheet);
  var tabs = document.querySelectorAll('#tabbar [data-tab]');
  for (var i = 0; i < tabs.length; i++) {
    var on = tabs[i].dataset.tab === view.tab;
    tabs[i].classList.toggle('active', on);
    if (on) tabs[i].setAttribute('aria-current', 'page');
    else tabs[i].removeAttribute('aria-current');
  }
  document.getElementById('banner').hidden = storageOK;
  var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
  document.getElementById('installbar').hidden = standalone || !!db.settings.a2hsDismissed;
  maybeTick();
}
function focusEl(idName, selectAll) {
  var i = document.getElementById(idName);
  if (i) { i.focus(); if (selectAll) i.select(); }
}

/* ── toast ───────────────────────────────────────────────────────────── */
var toastTimer = null;
function toast(msg) {
  var old = document.getElementById('toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = 'toast';
  t.setAttribute('role', 'status');
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.remove(); }, 2400);
}

/* ── exports & import ────────────────────────────────────────────────── */
function exportClientLog() {
  var st = hourStats();
  var rows = [['Client Name', 'Contact (Email or Phone)', 'Start Date', 'End Date', 'Paid Hours', 'Pro Bono Hours', 'Group (Y/N)', 'Number in Group', 'Peer or External', 'Notes']];
  db.clients.forEach(function (c) {
    var paid = 0, pro = 0;
    db.sessions.forEach(function (s) {
      if (s.clientId !== c.id || sessionBlockers(s, c).length) return;
      if (s.paid) paid += s.min; else pro += s.min;
    });
    rows.push([c.name, c.contact, c.start, c.end || '', fmtH(paid), fmtH(pro),
      c.kind === 'grp' ? 'Y' : 'N', c.kind === 'grp' ? c.size : '', c.peer ? 'Peer' : 'External', c.notes]);
  });
  download('acc-client-log-' + todayKey() + '.csv', csvJoin(rows), 'text/csv');
  toast('Client log exported — paste into ICF’s template');
}
function exportSessionsCSV() {
  var rows = [['Date', 'Client', 'Minutes', 'Hours', 'Paid or Pro bono', 'Counts toward ACC', 'Note']];
  db.sessions.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; }).forEach(function (s) {
    var c = clientById(s.clientId);
    rows.push([s.date, c ? c.name : '', s.min, fmtH(s.min), s.paid ? 'Paid' : 'Pro bono',
      sessionBlockers(s, c).length ? 'No' : 'Yes', s.note]);
  });
  download('acc-sessions-' + todayKey() + '.csv', csvJoin(rows), 'text/csv');
  toast('Sessions exported');
}
function exportJSON() {
  download('acc-companion-backup-' + todayKey() + '.json',
    JSON.stringify({ app: 'acc-companion', version: 1, exported: todayKey(), db: db }, null, 2),
    'application/json');
  db.settings.lastBackup = todayKey();
  save();
  toast('Backup downloaded');
}
function normalizeImport(obj) {
  if (!obj || typeof obj !== 'object') throw new Error('bad');
  var src = (obj.app === 'acc-companion' && obj.db && typeof obj.db === 'object') ? obj.db
    : (obj.settings && obj.clients ? obj : null);
  if (!src) throw new Error('bad');
  var d = migrate(src);
  d.device = db.device;      // stay this phone
  d.exam.active = null;      // never restore mid-exam state
  return d;
}

    if (!isDate(s.date)) { s.err = 'The session needs a date'; render(); return; }
    var min = clampInt(s.min, 1, 600, -1);
    if (min < 0) { s.err = 'Minutes, as a number (e.g. 60)'; render(); focusEl('f-smin', true); return; }
    var isNew = !s.id;
    if (s.id) {
      var x = sessionById(s.id);
      if (x) { x.clientId = s.clientId; x.date = s.date; x.min = min; x.paid = !!s.paid; x.note = String(s.note || '').slice(0, 200); }
    } else {
      db.sessions.push({ id: uid(), clientId: s.clientId, date: s.date, min: min, paid: !!s.paid, note: String(s.note || '').slice(0, 200) });
    }
    save();
    view.sheet = null;
    render();
    toast(isNew ? 'Session logged' : 'Saved');
  },
  'del-session': function () {
    var s = view.sheet;
    if (!s.confirmDelete) {
      syncSheet();
      s.confirmDelete = true;
      render();
      return;
    }
    db.sessions = db.sessions.filter(function (x) { return x.id !== s.id; });
    save();
    view.sheet = null;
    render();
    toast('Deleted');
  },
  'toggle-sessions': function () {
    view.hours.showAllSessions = !view.hours.showAllSessions;
    render();
  },
  'toggle-clients': function () {
    view.hours.showAllClients = !view.hours.showAllClients;
    render();
  }
});

document.addEventListener('click', function (ev) {
  var b = ev.target.closest('[data-act]');
  if (!b || b.disabled) return;
  var fn = ACTIONS[b.dataset.act];

  var el = ev.target;
  if (!el || el.id !== 'learn-q') return;
  view.learn.q = el.value;

  if (out) out.innerHTML = learnResultsHTML(view.learn.q);
});

document.addEventListener('change', function (ev) {
  var el = ev.target;
  if (!el || !el.dataset) return;
  if (el.dataset.role === 'set-training') {
    db.settings.trainingStart = isDate(el.value) ? el.value : null;
    save();
    render();
  } else if (el.dataset.role === 'set-target') {
    db.settings.targetApply = isDate(el.value) ? el.value : null;
    save();
    render();
  }
});

document.getElementById('importFile').addEventListener('change', function (ev) {
  var f = ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function () {
    try {
      view.pendingImport = normalizeImport(JSON.parse(String(reader.result)));
      view.importErr = null;
    } catch (e) {
      view.pendingImport = null;
      view.importErr = "That file doesn't look like an ACC Companion backup.";
    }
    render();
  };
  reader.onerror = function () {
    view.importErr = "Couldn't read that file.";
    render();
  };
  reader.readAsText(f);
});

document.addEventListener('keydown', function (ev) {
  if (ev.key === 'Escape' && view.sheet) {
    view.sheet = null;
    render();
  }
});

/* ── access gate ─────────────────────────────────────────────────────── */
var UNLOCK_KEY = 'acc.unlock.v1';
var unlocking = false;

function b64bytes(s) {
  var bin = atob(s);
  var a = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
  return a;
}
function unlockWith(pw) {
  if (typeof LEARN_ENC === 'undefined') return Promise.reject(new Error('nodata'));
  if (!(window.crypto && crypto.subtle)) return Promise.reject(new Error('nocrypto'));
  var base;
  return crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey'])
    .then(function (b) {
      base = b;
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt: b64bytes(LEARN_ENC.salt), iterations: LEARN_ENC.iter },
        base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    })
    .then(function (key) {
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64bytes(LEARN_ENC.iv) }, key, b64bytes(LEARN_ENC.ct));
    })
    .then(function (buf) {
      LEARN = JSON.parse(new TextDecoder().decode(buf));
      LEARN_OK = Array.isArray(LEARN) && LEARN.length > 0;
      LEARN_INDEX = null;
      try { localStorage.setItem(UNLOCK_KEY, pw); } catch (e) {}
    });
}
function lockMsg(msg) {
  var el = document.getElementById('lock-err');
  if (el) el.textContent = msg || '';
}
function showLock(msg) {
  document.getElementById('lock').hidden = false;
  lockMsg(msg);
  var i = document.getElementById('lock-pw');
  if (i) setTimeout(function () { i.focus(); }, 60);
}
function finishUnlock() {
  document.getElementById('lock').hidden = true;
  render();
}
function submitUnlock() {
  if (unlocking) return;
  var i = document.getElementById('lock-pw');
  var pw = i ? i.value : '';
  if (!pw) { lockMsg('Enter the access code.'); return; }
  unlocking = true;
  document.getElementById('lock-go').disabled = true;
  lockMsg('');
  unlockWith(pw).then(function () {
    unlocking = false;
    finishUnlock();
  }).catch(function (e) {
    unlocking = false;
    document.getElementById('lock-go').disabled = false;
    if (i) { i.value = ''; i.focus(); }
    lockMsg(e && e.message === 'nodata'
      ? 'The materials haven’t loaded — go online once and reload.'
      : e && e.message === 'nocrypto'
        ? 'This browser can’t decrypt the materials — use an up-to-date browser over https.'
        : 'That code doesn’t open it — try again.');
  });
}
ACTIONS['unlock'] = submitUnlock;
document.addEventListener('keydown', function (ev) {
  if (ev.key === 'Enter' && ev.target && ev.target.id === 'lock-pw') submitUnlock();
});

/* ── boot ────────────────────────────────────────────────────────────── */
applyTheme();
if (navigator.storage && navigator.storage.persist) {
  try { navigator.storage.persist().catch(function () {}); } catch (e) {}
}
(function boot() {
  var saved = null;
  try { saved = localStorage.getItem(UNLOCK_KEY); } catch (e) {}
  if (saved) {
    unlockWith(saved).then(finishUnlock).catch(function () {
      try { localStorage.removeItem(UNLOCK_KEY); } catch (e) {}
      showLock('');
    });
  } else {
    showLock('');
  }
})();
