    opts: ['Continue seamlessly, since the expertise is helpful', 'Disclose that they are stepping out of the coaching role into another capacity', 'Never mention the change of role', 'Bill the session at a higher rate'],
    ans: 1,
    why: 'When acting in a capacity other than coach, the coach discloses this to the client so the shift in role and relationship is transparent.',
    cite: '2020 Code — Role clarity' },
  { id: 'E11', d: 'eth', sub: 'Referral fees', diff: 2,
    stem: 'A coach receives a commission each time they refer a client to a particular consultancy. What does ethical practice require?',
    opts: ['Nothing, as referrals are normal business', 'Disclosing to the client any compensation received or paid for referrals', 'Keeping the arrangement private to avoid awkwardness', 'Referring only clients who will not ask questions'],
    ans: 1,
    why: 'Coaches disclose to clients any compensation or benefit paid or received for referrals, so the client can weigh the recommendation transparently.',
    cite: '2020 Code — Referrals' },
  { id: 'E12', d: 'eth', sub: 'Honest qualifications', diff: 1,
    stem: 'A coach who holds an ACC credential describes themselves in marketing as a “Master Certified Coach.” This is:',
    opts: ['Acceptable aspirational branding', 'A misrepresentation of credentials, which the Code prohibits', 'Fine if they are studying toward the MCC', 'Only a problem if a client complains'],
    ans: 1,
    why: 'Coaches accurately identify their coaching qualifications, expertise, experience, certifications and ICF credential, and make truthful statements about what they offer.',
    cite: '2020 Code — Professional integrity' },
  { id: 'E13', d: 'eth', sub: 'Accurate claims', diff: 1,
    stem: 'Which marketing statement is consistent with the ICF Code of Ethics?',
    opts: ['“Guaranteed promotion within six months or your money back”', '“I partner with clients to work toward goals they define”', '“The only coach who can truly fix your career”', '“Certified by ICF at the highest level” (when holding ACC)'],
    ans: 1,
    why: 'Coaches make verbal and written statements that are true and accurate about what they offer and do not make misleading or false claims.',
    cite: '2020 Code — Professional integrity' },
  { id: 'E14', d: 'eth', sub: 'Recognising limits', diff: 2,
    stem: 'A coaching client increasingly describes symptoms that suggest clinical depression. The ethically sound action is to:',
    opts: ['Add some counselling techniques to the coaching', 'Recognise the limits of coaching and discuss referral to an appropriate professional', 'Reassure the client that coaching will resolve it', 'Continue and hope the mood lifts'],
    ans: 1,
    why: 'Coaches recognise when issues fall outside coaching and refer clients to other professionals when indicated, staying within the boundaries of their competence.',
    cite: '2020 Code — Referral / competence' },
  { id: 'E15', d: 'eth', sub: 'Value & termination', diff: 2,
    stem: 'A coach senses the client is no longer benefiting from coaching. The Code encourages the coach to:',
    opts: ['Keep the engagement going to preserve income', 'Remain alert to whether the client is benefiting and discuss changes, including ending or referring', 'Switch to a stricter, more directive style', 'Blame the client’s lack of effort'],
    ans: 1,
    why: 'Coaches stay alert to indications that the client is no longer benefiting and are willing to explore changes to the relationship, including a different coach or resource.',
    cite: '2020 Code — Ongoing value' },
  { id: 'E16', d: 'eth', sub: 'No exploitation', diff: 1,
    stem: 'Which of the following would most clearly violate the ICF Code of Ethics?',
    opts: ['Ending a session on time', 'Using confidential client information for the coach’s personal advantage', 'Referring a client to a therapist', 'Reviewing the coaching agreement at the outset'],
    ans: 1,
    why: 'Coaches do not exploit any aspect of the coach-client relationship for personal, professional, or monetary advantage or benefit.',
    cite: '2020 Code — Professional conduct' },
  { id: 'E17', d: 'eth', sub: 'Gifts & influence', diff: 3,
    stem: 'A client offers the coach a valuable gift and access to a lucrative business deal “because we get on so well.” The best-guided response is to:',
    opts: ['Accept, as refusing would damage rapport', 'Consider the potential conflict of interest and boundary implications before responding', 'Accept the deal but decline the gift', 'Report the client to ICF'],
    ans: 1,
    why: 'Such offers can create conflicts of interest and blur boundaries; the coach reflects on and manages these, keeping the professional relationship clear.',
    cite: '2020 Code — Conflicts / boundaries' },
  { id: 'E18', d: 'eth', sub: 'Upholding the Code', diff: 1,
    stem: 'By pledging to the ICF Code of Ethics, a coach commits to:',
    opts: ['Follow it only with paying clients', 'Uphold the ethical standards in all coaching interactions and accept accountability for their conduct', 'Apply it only when convenient', 'Interpret each standard however they prefer'],
    ans: 1,
    why: 'ICF professionals pledge to abide by the Code, uphold ethical standards, and accept accountability for their actions in the practice of coaching.',
    cite: '2020 Code — Pledge' },
  { id: 'E19', d: 'eth', sub: 'Reporting concerns', diff: 3,
    stem: 'A coach becomes aware that a colleague is seriously breaching the ICF Code. The most appropriate step is to:',
    opts: ['Ignore it to avoid conflict', 'Address it or raise it through appropriate channels, consistent with ethical accountability', 'Post about it publicly on social media', 'Confront the colleague’s clients directly'],
    ans: 1,
    why: 'ICF professionals are accountable to the Code and may raise ethics concerns through appropriate ICF processes rather than ignoring them or acting inappropriately.',
    cite: '2020 Code — Accountability' },
  { id: 'E20', d: 'eth', sub: 'Third-party confidentiality', diff: 2,
    stem: 'In team coaching, one member privately shares sensitive information with the coach between sessions. The coach should:',
    opts: ['Repeat it to the team to promote transparency', 'Honour confidentiality per the agreed terms with all parties', 'Tell the team leader only', 'Use it to steer the next session without attribution'],
    ans: 1,
    why: 'Confidentiality applies regardless of the format; the coach maintains the agreed level of confidentiality with all parties involved.',
    cite: '2020 Code — Confidentiality' },
  { id: 'E21', d: 'eth', sub: 'Informed agreement', diff: 1,
    stem: 'A coaching agreement most centrally exists to:',
    opts: ['Protect the coach from lawsuits only', 'Establish clear expectations, roles, confidentiality, logistics and responsibilities before coaching begins', 'List the coach’s achievements', 'Guarantee specific outcomes'],
    ans: 1,
    why: 'Ethical practice includes establishing clear agreements about the coaching relationship, roles, responsibilities, confidentiality, logistics and fees.',
    cite: '2020 Code — Agreements' },
  { id: 'E22', d: 'eth', sub: 'Diversity & respect', diff: 2,
    stem: 'Which best reflects the ICF commitment to equity and respect in the coaching relationship?',
    opts: ['Treating all clients identically regardless of context', 'Being sensitive to clients’ identity, culture and context, and avoiding discrimination', 'Coaching only clients similar to oneself', 'Requiring clients to adopt the coach’s values'],
    ans: 1,
    why: 'Coaches are aware of and set culturally sensitive boundaries and avoid discrimination, respecting clients’ identity, environment and context.',
    cite: '2020 Code — Respect / equity' },
  { id: 'E23', d: 'eth', sub: 'Not medical/legal advice', diff: 2,
    stem: 'A client asks the coach, who is not a lawyer, whether to sign a contentious legal settlement. The coach should:',
    opts: ['Give a firm recommendation to be helpful', 'Stay within the coaching role and, where relevant, encourage the client to seek qualified professional advice', 'Interpret the contract clauses for the client', 'Refuse to discuss the topic at all'],
    ans: 1,
    why: 'Coaches work within the boundaries of their competence; they do not provide advice reserved for other licensed professionals and can encourage appropriate expert input while coaching the client’s thinking.',
    cite: '2020 Code — Competence' },
  { id: 'E24', d: 'eth', sub: 'Testimonials & privacy', diff: 2,
    stem: 'A coach wants to post a client’s name and story as a testimonial. Ethically, the coach must first:',
    opts: ['Assume consent because results were good', 'Obtain the client’s explicit permission and respect confidentiality', 'Anonymise only the company name', 'Post it and remove it if the client objects'],
    ans: 1,
    why: 'Client information is confidential; using identifiable client stories requires the client’s explicit, informed permission.',
    cite: '2020 Code — Confidentiality' },
  { id: 'E25', d: 'eth', sub: 'Supervision confidentiality', diff: 3,
    stem: 'When a coach discusses a case in coaching supervision or mentor coaching, confidentiality is maintained by:',
    opts: ['Sharing full identifying details for accuracy', 'Protecting the client’s identity and sensitive information as far as possible', 'Getting the client to attend supervision', 'Avoiding supervision altogether'],
    ans: 1,
    why: 'Even in supervision or mentor coaching, the coach safeguards client confidentiality, typically anonymising and sharing only what is necessary.',
    cite: '2020 Code — Confidentiality' },
  { id: 'E26', d: 'eth', sub: 'Power & influence', diff: 3,
    stem: 'Which practice best guards against misusing the influence a coach may hold over a client?',
    opts: ['Directing the client toward the coach’s preferred choices', 'Maintaining client autonomy and avoiding undue influence over the client’s decisions', 'Encouraging dependence so the client keeps returning', 'Withholding options the coach dislikes'],
    ans: 1,
    why: 'Coaches respect the client’s right to make their own decisions, avoid creating dependency, and do not exploit the relationship or exert undue influence.',
    cite: '2020 Code — Professional conduct' },
  { id: 'E27', d: 'eth', sub: 'Competence boundary', diff: 2,
    stem: 'A prospective client’s needs fall clearly outside the coach’s training and experience. The coach should:',
    opts: ['Take the work anyway and learn on the job', 'Work within the limits of their competence and refer or decline where appropriate', 'Claim expertise to win the contract', 'Subcontract secretly to another coach'],
    ans: 1,
    why: 'Coaches practise within the boundaries of their competence, expertise and experience, referring on where the work exceeds them.',
    cite: '2020 Code — Competence' },
  { id: 'E28', d: 'eth', sub: 'Recording consent', diff: 1,
    stem: 'Before recording a session (for example, for an ICF performance evaluation), the coach must:',
    opts: ['Record first and ask later', 'Obtain the client’s informed permission to record and to use the recording as intended', 'Assume consent is covered by the coaching agreement automatically', 'Only tell the client if they ask'],
    ans: 1,
    why: 'Recording requires the client’s informed consent, including how the recording will be used and stored — a direct application of confidentiality and agreements.',
    cite: '2020 Code — Confidentiality / consent' },
  { id: 'E29', d: 'eth', sub: 'Self-awareness', diff: 3,
    stem: 'A coach notices their own strong personal reaction to a client’s choices during sessions. Ethical self-management means:',
    opts: ['Letting the reaction guide stronger advice', 'Recognising personal limitations or circumstances that may impair coaching and managing or addressing them', 'Ending coaching with any client who triggers a reaction', 'Ignoring the reaction entirely'],
    ans: 1,
    why: 'Coaches recognise personal limitations or circumstances that may impair, conflict with or interfere with their coaching, and take action, which may include seeking support or suspending the work.',
    cite: '2020 Code — Professional integrity' },
  { id: 'E30', d: 'eth', sub: 'Systemic responsibility', diff: 3,
    stem: 'The ICF Code’s guidance to “do good” rather than merely “avoid bad” encourages coaches to:',
    opts: ['Meet the minimum legal standard only', 'Act with integrity and consider the broader impact of their work on clients and society', 'Prioritise profit above all', 'Avoid any risk by never challenging clients'],
    ans: 1,
    why: 'The Code asks coaches to adhere to a philosophy of doing good, acting with integrity and considering the wider impact of coaching, not just avoiding harm.',
    cite: '2020 Code — Professional integrity' },
  { id: 'E31', d: 'eth', sub: 'Sponsor pressure', diff: 3,
    stem: 'A sponsor pressures the coach to disclose whether the client “is really committed.” The coach’s best response protects:',
    opts: ['The sponsor’s right to information as payer', 'The confidentiality agreed with the client, redirecting the sponsor to agreed channels', 'The coach’s future contracts above all', 'Whatever keeps the sponsor happiest'],
    ans: 1,
    why: 'Confidentiality is maintained regardless of who pays; the coach honours the agreement and manages the conflict of interest between sponsor demands and client trust.',
    cite: '2020 Code — Confidentiality / conflicts' },
  { id: 'E32', d: 'eth', sub: 'Ethical termination', diff: 2,
    stem: 'When ending a coaching relationship, ethical practice includes:',
    opts: ['Stopping abruptly without notice', 'Handling the ending professionally and, where useful, supporting the client with appropriate referral', 'Keeping the client’s prepaid fees regardless', 'Blaming the client for the ending'],
    ans: 1,
    why: 'Coaches end relationships respectfully and professionally, supporting continuity of value where appropriate — for instance, by referring the client on.',
    cite: '2020 Code — Ongoing value' },
  { id: 'E33', d: 'eth', sub: 'Credential representation', diff: 1,
    stem: 'Which is the accurate way for an ACC holder to represent their ICF credential?',
    opts: ['“ICF Master Coach”', '“Associate Certified Coach (ACC), International Coaching Federation”', '“ICF Level 3 Coach”', '“Globally licensed ICF therapist”'],
    ans: 1,
    why: 'Coaches represent their actual ICF credential accurately; ACC stands for Associate Certified Coach and should be stated as awarded.',
    cite: '2020 Code — Professional integrity' },
  { id: 'E34', d: 'eth', sub: 'Fee transparency', diff: 2,
    stem: 'Ethical handling of fees and business terms requires the coach to:',
    opts: ['Change fees mid-engagement without notice', 'Be transparent and truthful about fees, terms and what is offered', 'Charge sponsors and clients different amounts secretly', 'Avoid discussing money to keep rapport'],
    ans: 1,
    why: 'Coaches are honest and transparent about fees and business arrangements, setting clear terms in the agreement.',
    cite: '2020 Code — Agreements / integrity' },
  { id: 'E35', d: 'eth', sub: 'Cultural boundaries', diff: 2,
    stem: 'Setting “culturally sensitive boundaries that govern professional interactions” means the coach:',
    opts: ['Applies one rigid standard to everyone', 'Is aware of and sets appropriate boundaries with sensitivity to cultural context', 'Avoids clients from unfamiliar cultures', 'Adopts each client’s customs uncritically'],
    ans: 1,
    why: 'The Code asks coaches to be aware of and set clear, appropriate, culturally sensitive boundaries governing interactions, physical or otherwise.',
    cite: '2020 Code — Boundaries' },
  { id: 'E36', d: 'eth', sub: 'Ethical decision-making', diff: 3,
    stem: 'A coach faces a genuinely ambiguous ethical situation not squarely covered by a single standard. The most professional next step is to:',
    opts: ['Guess and move on quickly', 'Engage in ethical reflection and seek guidance (e.g., ICF ethics resources, supervision) before acting', 'Do whatever the client prefers', 'Choose the option that earns the most money'],
    ans: 1,
    why: 'ICF supports ethical reflection and decision-making; when standards do not give a clear answer, coaches reflect, consult resources or supervision, and reason it through.',
    cite: 'ICF ethics guidance' },
  { id: 'E37', d: 'eth', sub: 'Romantic involvement', diff: 2,
    stem: 'During an engagement, a coach becomes aware of a mutual romantic attraction with the client. According to the ICF Code of Ethics, the coach should:',
    opts: ['Continue coaching while keeping the attraction private', 'Remain aware of the issue and take appropriate action, such as ending the coaching relationship before pursuing anything further', 'Ask the sponsor for permission to continue', 'Coach the client on the attraction itself'],
    ans: 1,
    why: 'The Code requires coaches to be aware of the potential for intimacy in the relationship and to avoid romantic or sexual relationships with clients — taking appropriate action, for example transferring or ending the engagement.',
    cite: '2020 Code — Responsibility to clients' },
  { id: 'E38', d: 'eth', sub: 'Support personnel', diff: 2,
    stem: 'A coach employs an assistant who schedules sessions and handles client emails. What does the Code require?',
    opts: ['Nothing — confidentiality applies only to the coach personally', 'That everyone who works with the coach’s clients is held to clear confidentiality agreements', 'That the assistant never learns client names', 'That the coach stops using assistants'],
    ans: 1,
    why: 'Coaches maintain confidentiality with all parties and require adherence to confidentiality by anyone who works with them in support of their clients.',
    cite: '2020 Code — Confidentiality' },
  { id: 'E39', d: 'eth', sub: 'Agreement timing', diff: 1,
    stem: 'When must the coaching agreement — roles, responsibilities, confidentiality and its limits — be established?',
    opts: ['Whenever a problem first arises', 'Before or at the first coaching session', 'After a few sessions, once trust exists', 'Only if the client requests it'],
    ans: 1,
    why: 'The Code requires an agreement about what coaching is and is not, confidentiality and its limits, logistics, fees and responsibilities to be created with clients and sponsors before or at the initial meeting.',
    cite: '2020 Code — Agreements' },
  { id: 'E40', d: 'eth', sub: 'Past illegal activity', diff: 3,
    stem: 'A client discloses a past workplace irregularity. There is no legal duty on the coach to report it and no risk of harm to anyone. The coach should:',
    opts: ['Report it to the client’s employer to be safe', 'Maintain confidentiality as agreed and, if relevant to the coaching, let the client explore the implications themselves', 'End the engagement immediately', 'Anonymously alert the authorities'],
    ans: 1,
    why: 'Confidentiality is breached only for recognised limits — such as legal requirements or imminent risk of harm. Absent those, the disclosure stays confidential; what the client does with it belongs to the client.',
    cite: '2020 Code — Confidentiality (limits)' },

  /* ── Definition & Boundaries (bnd) — 40 ────────────────────────────── */
  { id: 'B01', d: 'bnd', sub: 'Definition of coaching', diff: 1,
    stem: 'ICF defines coaching as:',
    opts: ['Giving expert advice to solve a client’s problems', 'Partnering with clients in a thought-provoking and creative process that inspires them to maximise their personal and professional potential', 'Diagnosing and treating psychological difficulties', 'Teaching a defined curriculum of skills'],
    ans: 1,
    why: 'The official ICF definition centres on partnering in a thought-provoking, creative process that inspires clients to maximise their potential — not advising, treating, or teaching.',
    cite: 'ICF definition of coaching' },
  { id: 'B02', d: 'bnd', sub: 'Coaching vs therapy', diff: 1,
    stem: 'A key distinction between coaching and therapy is that coaching:',
    opts: ['Focuses primarily on healing past emotional wounds', 'Is generally present- and future-oriented, working with functioning clients toward goals', 'Diagnoses mental health conditions', 'Requires a clinical licence'],
    ans: 1,
    why: 'Therapy often addresses healing from the past and diagnosable conditions; coaching typically works with mentally healthy clients in the present and future toward desired outcomes.',
    cite: 'Boundaries of coaching' },
  { id: 'B03', d: 'bnd', sub: 'Coaching vs counselling', diff: 2,
    stem: 'Which statement best separates coaching from counselling?',
    opts: ['Counselling and coaching are identical in practice', 'Counselling often helps clients resolve distress or dysfunction, while coaching partners with capable clients to move toward goals', 'Coaching treats trauma more effectively', 'Counselling never explores feelings'],
    ans: 1,
    why: 'Counselling frequently supports people experiencing distress or dysfunction; coaching assumes a resourceful client and focuses on forward movement and growth.',
    cite: 'Boundaries of coaching' },
  { id: 'B04', d: 'bnd', sub: 'Coaching vs mentoring', diff: 1,
    stem: 'The clearest difference between coaching and mentoring is that a mentor:',
    opts: ['Never shares their own experience', 'Typically shares their own expertise and advice from a similar field, whereas a coach draws out the client’s own thinking', 'Is always more senior in age', 'Focuses only on emotions'],
    ans: 1,
    why: 'A mentor shares personal expertise and guidance from experience in the mentee’s field; a coach partners with the client to evoke their own insight rather than supplying answers.',
    cite: 'Boundaries of coaching' },
  { id: 'B05', d: 'bnd', sub: 'Coaching vs consulting', diff: 1,
    stem: 'A consultant differs from a coach primarily because a consultant:',
    opts: ['Asks more open questions', 'Diagnoses problems and provides expert solutions or recommendations', 'Avoids giving any recommendations', 'Focuses on the client’s self-discovery'],
    ans: 1,
    why: 'Consultants are hired for expertise, analysing problems and recommending solutions; coaches partner with clients to generate the client’s own solutions.',
    cite: 'Boundaries of coaching' },
  { id: 'B06', d: 'bnd', sub: 'Coaching vs training', diff: 2,
    stem: 'How does coaching differ from training?',
    opts: ['Training is fully client-led with no set content', 'Training delivers a predetermined curriculum toward defined learning outcomes, while coaching follows the client’s agenda', 'Coaching always uses slides and exercises', 'They are interchangeable terms'],
    ans: 1,
    why: 'Training works from a set curriculum and objectives defined by the trainer; coaching is individualised and follows the client’s own agenda and goals.',
    cite: 'Boundaries of coaching' },
  { id: 'B07', d: 'bnd', sub: 'When to refer', diff: 2,
    stem: 'Which situation most clearly signals that a client may need referral to a mental-health professional rather than continued coaching?',
    opts: ['The client feels nervous before a big presentation', 'The client shows persistent, worsening symptoms such as inability to function, hopelessness or possible clinical depression', 'The client wants to change careers', 'The client disagrees with the coach'],
    ans: 1,
    why: 'Persistent, impairing symptoms — for example signs of clinical depression or an inability to function — fall outside coaching and indicate referral to a qualified professional.',
    cite: 'Recognising limits of coaching' },
  { id: 'B08', d: 'bnd', sub: 'Mental-health signs', diff: 2,
    stem: 'A coach notices a client describing hopelessness, disrupted sleep, loss of interest and difficulty functioning over several weeks. The best response is to:',
    opts: ['Intensify goal-setting to re-motivate them', 'Compassionately name the limits of coaching and support a referral to appropriate help', 'Diagnose likely depression for the client', 'Continue coaching and monitor privately'],
    ans: 1,
    why: 'These are possible indicators of a clinical condition. The coach does not diagnose, but recognises the boundary and supports referral to a suitable professional.',
    cite: 'Recognising limits of coaching' },
  { id: 'B09', d: 'bnd', sub: 'Trauma & scope', diff: 3,
    stem: 'A client begins to disclose unresolved trauma that repeatedly overwhelms them in sessions. The coach should:',
    opts: ['Use therapeutic techniques to process the trauma', 'Hold a caring boundary, acknowledge it exceeds coaching, and explore what support the client needs', 'Insist the client “move on” to goals', 'Terminate immediately without discussion'],
    ans: 1,
    why: 'Processing trauma is therapeutic work outside coaching. The coach stays present, names the boundary, and helps the client consider appropriate support — without attempting to treat it.',
    cite: 'Boundaries / scope' },
  { id: 'B10', d: 'bnd', sub: 'Substance issues', diff: 2,
    stem: 'A client reveals a likely substance dependence affecting daily life. The coaching-appropriate action is to:',
    opts: ['Design a willpower plan to quit in coaching', 'Recognise this needs specialised support and encourage referral to appropriate services', 'Ignore it and focus on career goals', 'Require abstinence as a condition of coaching'],
    ans: 1,
    why: 'Substance dependence requires specialised clinical support; the coach recognises the limit and encourages appropriate professional help.',
    cite: 'Recognising limits of coaching' },
  { id: 'B11', d: 'bnd', sub: 'Client is whole', diff: 1,
    stem: 'A foundational assumption of coaching is that the client is:',
    opts: ['Broken and in need of fixing', 'Naturally creative, resourceful and whole', 'Unable to find their own answers', 'Dependent on the coach’s expertise'],
    ans: 1,
    why: 'Coaching holds the client as creative, resourceful and whole — capable of generating their own insights and solutions with the coach as partner.',
    cite: 'Coaching stance' },
  { id: 'B12', d: 'bnd', sub: 'Who sets the agenda', diff: 1,
    stem: 'In a coaching engagement, the agenda for the work is set by:',
    opts: ['The coach, based on their assessment', 'The client', 'The sponsor exclusively', 'A standardised program'],
    ans: 1,
    why: 'The client sets the agenda in coaching; the coach partners with them to explore and progress it, unlike consulting or training.',
    cite: 'Coaching stance' },
  { id: 'B13', d: 'bnd', sub: 'Coach as partner', diff: 1,
    stem: 'The coaching relationship is best described as:',
    opts: ['Expert-to-novice', 'A partnership of equals in service of the client’s agenda', 'Teacher-to-student', 'Clinician-to-patient'],
    ans: 1,
    why: 'Coaching is a partnership; the coach does not position as the expert on the client’s life but works alongside them in service of their goals.',
    cite: 'Coaching stance' },
  { id: 'B14', d: 'bnd', sub: 'Scope of coaching', diff: 2,
    stem: 'Which focus is most squarely within the scope of coaching?',
    opts: ['Interpreting childhood causes of current behaviour', 'Helping a client clarify goals and design forward action they choose', 'Prescribing treatment for anxiety', 'Delivering a certified skills curriculum'],
    ans: 1,
    why: 'Coaching centres on present and future goals and self-directed action; interpreting root psychological causes or prescribing treatment lies outside it.',
    cite: 'Boundaries of coaching' },
  { id: 'B15', d: 'bnd', sub: 'Emotion in coaching', diff: 2,
    stem: 'A client becomes tearful while describing a meaningful decision. Within coaching, this:',
    opts: ['Automatically means the client needs therapy', 'Can be a normal part of coaching, which works with emotion in service of the client’s agenda', 'Should be shut down to stay on task', 'Requires the coach to diagnose the feeling'],
    ans: 1,
    why: 'Emotion is a natural part of human change; coaching can hold and work with it, as long as it stays in service of the client’s goals and does not become clinical treatment.',
    cite: 'Scope / presence' },
  { id: 'B16', d: 'bnd', sub: 'Clinical issues', diff: 2,
    stem: 'Which is NOT an appropriate focus for coaching?',
    opts: ['Preparing for a difficult conversation at work', 'Treating a diagnosed eating disorder', 'Clarifying values before a career move', 'Building a plan to develop a new skill'],
    ans: 1,
    why: 'Treating a diagnosed clinical disorder is the work of licensed health professionals, not coaching.',
    cite: 'Boundaries of coaching' },
  { id: 'B17', d: 'bnd', sub: 'Coach competence', diff: 2,
    stem: 'A coach is offered work that is well outside their experience and training. The boundary-respecting choice is to:',
    opts: ['Accept and improvise', 'Acknowledge the limit of their competence and refer or decline', 'Claim broad expertise', 'Take the work but charge less'],
    ans: 1,
    why: 'Coaches work within the boundaries of their competence and refer on when a request exceeds their training and experience.',
    cite: 'Competence boundary' },
  { id: 'B18', d: 'bnd', sub: 'Directiveness', diff: 3,
    stem: 'Compared with consulting, coaching sits where on the directive spectrum?',
    opts: ['Highly directive — the coach prescribes actions', 'Predominantly non-directive — the coach evokes the client’s own thinking and choices', 'Entirely passive — the coach says nothing', 'Directive on goals, passive on everything else'],
    ans: 1,
    why: 'Coaching is largely non-directive: the coach partners and evokes rather than prescribing, trusting the client to generate direction.',
    cite: 'Coaching stance' },
  { id: 'B19', d: 'bnd', sub: 'Relationship structure', diff: 2,
    stem: 'Which best describes a professional coaching engagement?',
    opts: ['An informal chat between friends', 'A structured, agreement-based professional relationship with defined roles and confidentiality', 'A one-off motivational talk', 'A supervisory reporting line'],
    ans: 1,
    why: 'Coaching is a structured professional relationship governed by an agreement covering roles, confidentiality, logistics and goals — distinct from friendship or management.',
    cite: 'Agreements / structure' },
  { id: 'B20', d: 'bnd', sub: 'Advice vs coaching', diff: 1,
    stem: 'When a coach mostly tells the client what they should do, the interaction has drifted into:',
    opts: ['Deeper coaching', 'Advice-giving/consulting, which is not coaching', 'Active listening', 'Evoking awareness'],
    ans: 1,
    why: 'Repeatedly telling the client what to do is advising or consulting; coaching partners with the client to surface their own options and choices.',
    cite: 'Boundaries of coaching' },
  { id: 'B21', d: 'bnd', sub: 'Mid-session referral', diff: 3,
    stem: 'Partway through coaching, it becomes clear the presenting issue is primarily a clinical mental-health matter. The coach should:',
    opts: ['Finish the contracted sessions first, then mention it', 'Address it promptly, discuss the boundary, and support referral to appropriate care', 'Quietly shift into a therapeutic approach', 'Refer only if the client raises it'],
    ans: 1,
    why: 'When coaching is no longer appropriate, the coach acts promptly and transparently, discussing the boundary and supporting a referral rather than continuing outside scope.',
    cite: 'Recognising limits' },
  { id: 'B22', d: 'bnd', sub: 'Concurrent support', diff: 3,
    stem: 'A client is in therapy and also wants coaching for a career goal. This is:',
    opts: ['Never permissible', 'Potentially appropriate, provided the coaching stays within scope and, ideally, there is awareness/coordination as needed', 'Only allowed if therapy stops', 'A conflict of interest by definition'],
    ans: 1,
    why: 'Coaching and therapy can run in parallel when the coaching remains within its scope; coordination or the client’s awareness helps keep the boundaries clear.',
    cite: 'Boundaries / scope' },
  { id: 'B23', d: 'bnd', sub: 'Coaching niches', diff: 1,
    stem: 'Executive coaching and life coaching differ mainly in:',
    opts: ['Whether ICF competencies apply', 'Their typical context and focus, while sharing the same core coaching competencies and ethics', 'Whether confidentiality is required', 'Whether the client sets the agenda'],
    ans: 1,
    why: 'Different coaching contexts share the same ICF competencies, ethics and definition; they vary in setting and focus, not in what makes it coaching.',
    cite: 'Coaching scope' },
  { id: 'B24', d: 'bnd', sub: 'Not friendship', diff: 2,
    stem: 'What distinguishes coaching from a supportive friendship?',
    opts: ['Coaching never involves warmth', 'Coaching is a bounded professional relationship with an agreement, purpose, and ethical standards', 'Friends ask better questions', 'Coaching forbids emotional topics'],
    ans: 1,
    why: 'Coaching is professional and bounded — structured by an agreement, purpose and ethics — whereas friendship is mutual and unstructured.',
    cite: 'Structure / boundaries' },
  { id: 'B25', d: 'bnd', sub: 'Managing expectations', diff: 2,
    stem: 'A new client expects the coach to “give expert answers about my industry.” The coach should:',
    opts: ['Provide industry answers to satisfy them', 'Clarify what coaching is and is not, and how the partnership works', 'Pretend to have that expertise', 'Refer them immediately to a consultant'],
    ans: 1,
    why: 'Setting accurate expectations about the nature of coaching (partnering, not expert-answering) is part of establishing the agreement and honest practice.',
    cite: 'Agreements / definition' },
  { id: 'B26', d: 'bnd', sub: 'Domain expertise', diff: 2,
    stem: 'To coach a client effectively, the coach must:',
    opts: ['Be an expert in the client’s field', 'Be skilled in the coaching process, not necessarily an expert in the client’s subject', 'Have done the client’s exact job', 'Provide technical solutions'],
    ans: 1,
    why: 'Coaching expertise is in the process of partnering and evoking; subject-matter expertise in the client’s field is not required and can even pull the coach toward advising.',
    cite: 'Coaching stance' },
  { id: 'B27', d: 'bnd', sub: 'Client capability', diff: 1,
    stem: 'Coaching presupposes that the client:',
    opts: ['Cannot proceed without the coach’s solutions', 'Has the capacity to find their own answers with support', 'Must be told what to prioritise', 'Needs diagnosis before progress'],
    ans: 1,
    why: 'A core premise is the client’s capability: coaching draws out the client’s own resourcefulness rather than supplying answers.',
    cite: 'Coaching stance' },
  { id: 'B28', d: 'bnd', sub: 'Vs performance management', diff: 3,
    stem: 'A manager “coaching” a direct report toward targets the manager sets is different from ICF coaching because:',
    opts: ['It uses questions', 'The agenda and authority sit with the manager, not the client, and evaluation is involved', 'It is always unethical', 'It cannot build rapport'],
    ans: 1,
    why: 'Managerial coaching involves the manager’s agenda, authority and evaluation; ICF coaching is client-agenda-led and free of that evaluative power dynamic (also why coaching direct reports does not count as client hours).',
    cite: 'Boundaries / roles' },
  { id: 'B29', d: 'bnd', sub: 'Masked clinical issue', diff: 3,
    stem: 'A client presents a “time-management” goal, but sessions reveal severe, impairing anxiety underlying it. The coach should:',
    opts: ['Stick strictly to time-management tools', 'Notice the underlying issue, hold the boundary, and explore appropriate support while coaching what is coachable', 'Treat the anxiety with relaxation therapy', 'Ignore the anxiety as off-topic'],
    ans: 1,
    why: 'When a coachable goal masks a clinical issue, the coach recognises it, keeps within scope, and supports referral for the clinical part rather than treating it.',
    cite: 'Recognising limits' },
  { id: 'B30', d: 'bnd', sub: 'Grief', diff: 3,
    stem: 'A client experiencing acute, recent bereavement wants to “coach through the grief.” The most appropriate stance is:',
    opts: ['Coach the grief as any other goal', 'Acknowledge that acute grief may need other support, hold care, and consider referral, coaching only what is genuinely coachable', 'Refuse to acknowledge the loss', 'Provide grief counselling'],
    ans: 1,
    why: 'Acute grief often needs bereavement or clinical support; the coach shows care, respects the boundary, and refers as appropriate rather than delivering counselling.',
    cite: 'Boundaries / referral' },
  { id: 'B31', d: 'bnd', sub: 'Safety / crisis', diff: 3,
    stem: 'If a client expresses active suicidal intent during a session, the coach’s priority is to:',
    opts: ['Continue the coaching agenda calmly', 'Prioritise the client’s safety, follow the confidentiality agreement’s risk provisions, and connect them to emergency/appropriate help', 'Keep it confidential no matter what', 'End the call and move on'],
    ans: 1,
    why: 'Imminent risk to life overrides ordinary confidentiality; the coach acts on the risk-of-harm provisions, prioritising safety and appropriate professional/emergency support.',
    cite: 'Limits of confidentiality / safety' },
  { id: 'B32', d: 'bnd', sub: 'Self-disclosure', diff: 3,
    stem: 'Coach self-disclosure (sharing one’s own story) in coaching is best used:',
    opts: ['Freely, to build friendship', 'Sparingly and in service of the client, not to shift focus to the coach', 'Never, under any circumstances', 'To demonstrate the coach’s expertise'],
    ans: 1,
    why: 'Coaching keeps the focus on the client; occasional self-disclosure must serve the client’s agenda rather than centre the coach or drift into mentoring.',
    cite: 'Presence / focus' },
  { id: 'B33', d: 'bnd', sub: 'Vs facilitation', diff: 3,
    stem: 'Group facilitation differs from group coaching primarily in that facilitation:',
    opts: ['Always uses ICF competencies', 'Guides a group process toward a task or content outcome, whereas coaching partners with members’ own agendas and learning', 'Is confidential and coaching is not', 'Cannot involve questions'],
    ans: 1,
    why: 'Facilitation manages group process toward a defined task/outcome; coaching partners with the group/individuals around their own agendas and growth.',
    cite: 'Boundaries of coaching' },
  { id: 'B34', d: 'bnd', sub: 'Confidentiality & safety', diff: 2,
    stem: 'The boundary that permits breaking confidentiality is best summarised as:',
    opts: ['Whenever the sponsor requests it', 'Situations such as risk of serious harm or legal requirement, ideally pre-agreed with the client', 'Any time the coach feels uneasy', 'Never, without exception'],
    ans: 1,
    why: 'Confidentiality holds except for recognised limits — imminent risk of harm or legal obligation — which are set out in the agreement in advance.',
    cite: 'Limits of confidentiality' },
  { id: 'B35', d: 'bnd', sub: 'Referral while caring', diff: 2,
    stem: 'When referring a client to another professional, a coach can best preserve the relationship by:',
    opts: ['Abruptly cutting contact', 'Explaining the reason with care, respecting the client, and offering continuity where appropriate', 'Telling the client they are “too much”', 'Making the referral without informing the client'],
    ans: 1,
    why: 'A caring, transparent referral respects the client and the relationship, framing it as serving the client’s best interests rather than rejection.',
    cite: 'Referral practice' },
  { id: 'B36', d: 'bnd', sub: 'Client wants therapy', diff: 2,
    stem: 'A client explicitly says they actually want to process a past trauma, not pursue a goal. The coach should:',
    opts: ['Reframe it as a coaching goal anyway', 'Acknowledge that this is therapeutic work and support the client toward appropriate help', 'Attempt trauma processing to be helpful', 'Insist coaching is the same as therapy'],
    ans: 1,
    why: 'When the client’s actual need is therapeutic, the coach honours the boundary and supports referral rather than reframing clinical work as coaching.',
    cite: 'Boundaries / referral' },
  { id: 'B37', d: 'bnd', sub: 'How to refer', diff: 2,
    stem: 'A coach concludes a client would benefit from seeing a mental-health professional. The most appropriate way to make the referral is to:',
    opts: ['Name the likely diagnosis so the client can research it', 'Share the observation without diagnosing, and support the client in finding qualified help — for example several options rather than one', 'Hand over one therapist’s card and end the session', 'Contact a therapist directly on the client’s behalf without telling them'],
    ans: 1,
    why: 'The coach does not diagnose. An appropriate referral names what was observed, respects the client’s autonomy and choice, and supports access to qualified professionals.',
    cite: 'Referral practice (ICF referral white paper)' },
  { id: 'B38', d: 'bnd', sub: 'Mentor coaching vs supervision', diff: 3,
    stem: 'What distinguishes mentor coaching from coaching supervision?',
    opts: ['They are two names for the same service', 'Mentor coaching develops a coach’s skill against the ICF Core Competencies (e.g., for credentialing); supervision is broader reflective practice on the coach’s work and wellbeing', 'Supervision is for clients; mentor coaching is for sponsors', 'Mentor coaching is unpaid; supervision is paid'],
    ans: 1,
    why: 'Mentor coaching is competency-focused development of the coach’s coaching, required for credentialing. Coaching supervision is a reflective practice examining the coach’s client work, patterns and resourcefulness. Neither counts as client coaching hours.',
    cite: 'ICF mentor coaching & supervision definitions' },
  { id: 'B39', d: 'bnd', sub: 'Client vs sponsor', diff: 1,
    stem: 'In ICF terminology, when an organisation pays for an employee’s coaching, the employee is the:',
    opts: ['Sponsor, and the organisation is the client', 'Client, and the organisation is the sponsor', 'Stakeholder, and the coach is the client', 'Customer, and HR is the client'],
    ans: 1,
    why: 'The client is the person being coached; the sponsor is the entity paying for or arranging the coaching. The distinction drives what may be shared and with whom.',
    cite: '2020 Code — Definitions' },
  { id: 'B40', d: 'bnd', sub: 'Coaching a third party', diff: 2,
    stem: 'A client spends the session asking the coach to help “fix” a difficult colleague who is not present. The coach best serves the client by:',
    opts: ['Analysing the colleague’s likely personality', 'Bringing the focus back to the client — what they can influence, choose or do in the relationship', 'Offering to coach the colleague too', 'Agreeing the colleague is the problem'],
    ans: 1,
    why: 'Coaching works with the person in the conversation. The coach cannot coach an absent third party; the leverage lies in the client’s own perceptions, choices and actions.',
    cite: 'Definition of coaching / partnering' },

  /* ── Competencies, strategies & techniques (cmp) — 54 ──────────────── */
  { id: 'C01', d: 'cmp', sub: 'Session agreement', diff: 1,
    stem: 'At the start of a single session, establishing the agreement most importantly involves:',
    opts: ['Reviewing the coach’s credentials', 'Partnering with the client to identify what they want to accomplish in this session', 'Setting the coach’s objectives for the client', 'Summarising the previous session at length'],
    ans: 1,
    why: 'Establishing agreements includes partnering with the client to identify or reconfirm what they want to accomplish in this specific session (the session outcome).',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C02', d: 'cmp', sub: 'Engagement vs session', diff: 2,
    stem: 'The difference between the overall coaching agreement and the session agreement is that the overall agreement:',
    opts: ['Replaces the need for session agreements', 'Covers the whole engagement (logistics, confidentiality, goals), while each session sets its own specific outcome', 'Is set only by the sponsor', 'Is optional in professional coaching'],
    ans: 1,
    why: 'Coaches establish agreements for the overall engagement and separately partner with the client on what each session should accomplish.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C03', d: 'cmp', sub: 'Measures of success', diff: 2,
    stem: 'Who defines what success looks like for a coaching session?',
    opts: ['The coach, from best practice', 'The client, partnered by the coach', 'The sponsor’s HR policy', 'A standard competency rubric'],
    ans: 1,
    why: 'The coach partners with the client to define how the client will know the session was successful — the client owns the measures of success.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C04', d: 'cmp', sub: 'Coaching mindset', diff: 1,
    stem: 'Embodying a coaching mindset means maintaining a stance that is:',
    opts: ['Expert and evaluative', 'Open, curious, flexible and client-centred', 'Detached and neutral to the point of passivity', 'Focused on the coach’s model'],
    ans: 1,
    why: 'A coaching mindset is open, curious, flexible and client-centred, developed and sustained through ongoing reflection and learning.',
    cite: 'CC2 Embodies a Coaching Mindset' },
  { id: 'C05', d: 'cmp', sub: 'Ethical foundation', diff: 1,
    stem: 'Within the ICF competency model, demonstrating ethical practice is categorised as:',
    opts: ['A communication skill', 'A foundational competency underpinning all coaching', 'An optional add-on', 'Only relevant to credentialing exams'],
    ans: 1,
    why: 'Demonstrates Ethical Practice sits in the Foundation domain and underlies every other competency in the model.',
    cite: 'CC1 Demonstrates Ethical Practice' },
  { id: 'C06', d: 'cmp', sub: 'Trust & safety', diff: 2,
    stem: 'Which coach behaviour most builds trust and psychological safety?',
    opts: ['Correcting the client’s “wrong” thinking', 'Showing respect for the client’s perceptions, and support for their expression of feelings and beliefs', 'Steering to the coach’s preferred solution', 'Keeping an emotional distance'],
    ans: 1,
    why: 'Cultivating trust and safety includes respecting the client, acknowledging their work, and supporting their expression of feelings, perceptions and beliefs.',
    cite: 'CC4 Cultivates Trust & Safety' },
  { id: 'C07', d: 'cmp', sub: 'Presence', diff: 1,
    stem: 'Maintaining coaching presence is best described as being:',
    opts: ['Busy taking detailed notes', 'Fully conscious and present with the client — open, flexible, grounded and confident', 'Focused on the next question to ask', 'Attached to a strong outcome'],
    ans: 1,
    why: 'Presence means being fully conscious and present with the client with an open, flexible, grounded and confident style — not preoccupied with technique or outcome.',
    cite: 'CC5 Maintains Presence' },
  { id: 'C08', d: 'cmp', sub: 'Presence & self-management', diff: 2,
    stem: 'A client shares something that stirs the coach’s own strong feelings. Presence is best maintained by:',
    opts: ['Immediately sharing the coach’s feelings at length', 'Noticing and managing one’s reactions so as to stay present and focused on the client', 'Suppressing all awareness of the reaction', 'Ending the session'],
    ans: 1,
    why: 'Presence includes self-management — being aware of and managing one’s own emotions so as to remain grounded and centred on the client.',
    cite: 'CC5 Maintains Presence' },
  { id: 'C09', d: 'cmp', sub: 'Active listening', diff: 1,
    stem: 'Active listening in ICF coaching focuses on:',
    opts: ['Only the literal words spoken', 'What the client is and is not saying, in the context of the client’s whole system, to support their self-expression', 'Formulating advice while the client talks', 'Comparing the client to other clients'],
    ans: 1,
    why: 'Listens Actively means attending to what the client is and is not communicating — words, tone, behaviour, context — to fully understand and support self-expression.',
    cite: 'CC6 Listens Actively' },
  { id: 'C10', d: 'cmp', sub: 'What is not said', diff: 2,
    stem: 'Noticing a shift in the client’s tone or energy, and gently reflecting it, is an example of:',
    opts: ['Interrupting the client', 'Listening for what is not said and inviting the client to explore it', 'Leading the client to a conclusion', 'Giving feedback on performance'],
    ans: 1,
    why: 'Active listening includes noticing what is not said — emotion, energy, hesitation — and reflecting it so the client can explore its meaning.',
    cite: 'CC6 Listens Actively' },
  { id: 'C11', d: 'cmp', sub: 'Reflecting & paraphrasing', diff: 2,
    stem: 'The primary purpose of a coach summarising or paraphrasing the client is to:',
    opts: ['Demonstrate the coach’s memory', 'Confirm understanding and let the client hear and refine their own thinking', 'Fill silence', 'Redirect to the coach’s agenda'],
    ans: 1,
    why: 'Paraphrasing checks the coach’s understanding and reflects the client’s meaning back so the client can confirm or deepen it — best kept concise and checked with the client.',
    cite: 'CC6 Listens Actively' },
  { id: 'C12', d: 'cmp', sub: 'Evoking awareness', diff: 1,
    stem: 'Evokes Awareness is chiefly about:',
    opts: ['Giving the client insights the coach has had', 'Facilitating the client’s own insight and learning, e.g. through powerful questions and silence', 'Teaching a framework', 'Assessing the client’s personality'],
    ans: 1,
    why: 'Evokes Awareness facilitates client insight and learning using tools such as powerful questioning, silence, metaphor and analogy — the insight is the client’s.',
    cite: 'CC7 Evokes Awareness' },
  { id: 'C13', d: 'cmp', sub: 'Powerful questions', diff: 1,
    stem: 'A hallmark of a powerful coaching question is that it is:',
    opts: ['Closed, to confirm facts quickly', 'Open, clear, and asked one at a time, evoking the client’s reflection', 'Layered with several questions at once', 'Leading toward the coach’s answer'],
    ans: 1,
    why: 'Powerful questions are clear, open and asked one at a time, at a pace that allows reflection — not stacked, leading, or closed by default.',
    cite: 'CC7 Evokes Awareness' },
  { id: 'C14', d: 'cmp', sub: 'Silence', diff: 2,
    stem: 'After asking a meaningful question, the coach is best served by:',
    opts: ['Filling the pause with another question', 'Allowing silence so the client can think, feel and reflect', 'Answering the question themselves', 'Moving to a new topic'],
    ans: 1,
    why: 'Allowing silence, pause and reflection gives the client space to process and often produces the deepest insight; filling it interrupts the client’s thinking.',
    cite: 'CC5/CC7 Presence & Evokes Awareness' },
  { id: 'C15', d: 'cmp', sub: 'Metaphor & analogy', diff: 2,
    stem: 'Inviting a client to explore a metaphor they used (“it’s like hitting a wall”) can:',
    opts: ['Distract from real work', 'Deepen the client’s awareness by working with their own imagery', 'Impose the coach’s interpretation', 'Replace the need for questions'],
    ans: 1,
    why: 'Working with the client’s own metaphor or analogy is a recognised way to evoke awareness, staying grounded in the client’s language and meaning.',
    cite: 'CC7 Evokes Awareness' },
  { id: 'C16', d: 'cmp', sub: 'Facilitates growth', diff: 1,
    stem: 'Facilitating client growth centres on:',
    opts: ['The coach assigning homework', 'Partnering with the client to turn insight into action they design and own', 'Prescribing a standard action plan', 'Evaluating the client’s performance'],
    ans: 1,
    why: 'Facilitates Client Growth partners with the client to transform learning and insight into self-designed action, promoting autonomy.',
    cite: 'CC8 Facilitates Client Growth' },
  { id: 'C17', d: 'cmp', sub: 'Client autonomy', diff: 1,
    stem: 'Promoting client autonomy means the coach:',
    opts: ['Decides the client’s next steps', 'Supports the client in designing their own actions and holding their own accountability', 'Checks up on the client daily', 'Rewards compliance'],
    ans: 1,
    why: 'Coaching promotes client autonomy: the client designs actions and owns accountability, rather than depending on the coach to direct them.',
    cite: 'CC8 Facilitates Client Growth' },
  { id: 'C18', d: 'cmp', sub: 'Accountability', diff: 2,
    stem: 'In coaching, accountability for acting on commitments rests with:',
    opts: ['The coach, who must ensure follow-through', 'The client, with the coach partnering to explore progress and learning', 'The sponsor', 'Whoever set the goal'],
    ans: 1,
    why: 'Accountability sits with the client; the coach partners to support and explore it — for example asking what the client learned — not to police it.',
    cite: 'CC8 Facilitates Client Growth' },
  { id: 'C19', d: 'cmp', sub: 'Goal in session', diff: 2,
    stem: 'A client opens with a broad topic (“work stress”). A skilful coaching move is to:',
    opts: ['Start giving stress-reduction tips', 'Partner with the client to define a specific, workable outcome for the session', 'Assume the goal is to “feel less stressed”', 'Explore the coach’s own stress experience'],
    ans: 1,
    why: 'The coach helps the client narrow a broad topic into a clear session outcome they want to reach — establishing the agreement before working it.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C20', d: 'cmp', sub: 'Outcome vs topic', diff: 3,
    stem: 'The distinction between the client’s topic and the session outcome is that the outcome is:',
    opts: ['The subject the client wants to discuss', 'What the client wants to walk away with by the end of the session', 'The coach’s summary', 'The long-term life goal only'],
    ans: 1,
    why: 'The topic is what the client wants to talk about; the outcome is what they want to achieve or leave with from the session — coaches partner to define the latter.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C21', d: 'cmp', sub: 'Partnering', diff: 2,
    stem: 'Which phrasing best reflects partnering with the client?',
    opts: ['“Here is what you should do next.”', '“What would be most useful for us to focus on now?”', '“I think your real problem is X.”', '“The right answer is usually Y.”'],
    ans: 1,
    why: 'Partnering invites the client to co-direct the work; it shares ownership rather than positioning the coach as the one with the answers.',
    cite: 'Partnering across competencies' },
  { id: 'C22', d: 'cmp', sub: 'Direct communication', diff: 2,
    stem: 'Coaching “direct communication” is best characterised as:',
    opts: ['Long, elaborate questions', 'Clear, concise and respectful language that serves the client', 'Bluntly telling the client hard truths', 'Using specialist jargon to sound expert'],
    ans: 1,
    why: 'Effective coach communication is clear and concise, using the client’s language and serving their understanding — not wordy, jargon-laden, or bluntly directive.',
    cite: 'CC6/CC7 Communicating Effectively' },
  { id: 'C23', d: 'cmp', sub: '“I don’t know”', diff: 2,
    stem: 'When a client says “I don’t know,” an effective first coaching response is often to:',
    opts: ['Immediately supply possible answers', 'Allow space, or gently invite exploration (e.g., “What comes to mind if you did know?”)', 'Move to a different question quickly', 'Tell the client the answer is obvious'],
    ans: 1,
    why: '“I don’t know” is usually the edge of thinking. Presence and evoking awareness suggest giving space or a light invitation, rather than rescuing with answers.',
    cite: 'CC5/CC7 Presence & Evokes Awareness' },
  { id: 'C24', d: 'cmp', sub: 'Managing drift', diff: 2,
    stem: 'The conversation has drifted from the agreed session outcome. The coach should:',
    opts: ['Silently follow wherever it goes', 'Notice the shift and partner with the client on where they want to focus', 'Force a return to the original topic', 'End the session'],
    ans: 1,
    why: 'Coaches attend to the agreed agenda and, when it shifts, make the shift visible and let the client choose where to focus.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C25', d: 'cmp', sub: 'Closing a session', diff: 2,
    stem: 'A strong session close typically includes:',
    opts: ['The coach summarising the client’s insights for them', 'Partnering with the client to capture learning and any chosen next steps, and closing with them', 'Adding new topics at the last minute', 'Assigning the coach’s recommended actions'],
    ans: 1,
    why: 'Facilitating growth includes supporting the client to name their learning and design next steps, and partnering on how to close — not the coach summarising or prescribing.',
    cite: 'CC8 Facilitates Client Growth' },
  { id: 'C26', d: 'cmp', sub: 'Curiosity over judgment', diff: 2,
    stem: 'Which stance best supports evoking awareness?',
    opts: ['Evaluating whether the client’s choices are correct', 'Genuine curiosity about the client, their thinking and their world', 'Comparing the client to an ideal', 'Deciding early what the client needs'],
    ans: 1,
    why: 'A curious, non-judgmental stance opens exploration; evaluation and early conclusions close it down and reflect the coach’s agenda.',
    cite: 'CC5/CC7' },
  { id: 'C27', d: 'cmp', sub: 'Non-attachment', diff: 3,
    stem: 'A coach notices they are attached to the client choosing a particular action. Skilful practice is to:',
    opts: ['Persuade the client toward it', 'Let go of the attachment and stay in service of the client’s own choices', 'End the topic', 'Hint repeatedly until the client agrees'],
    ans: 1,
    why: 'Presence and partnering require holding no attachment to a specific outcome; the coach serves the client’s autonomy rather than steering to a preferred answer.',
    cite: 'CC5 Maintains Presence' },
  { id: 'C28', d: 'cmp', sub: 'Acknowledging vs praising', diff: 3,
    stem: 'Which is an example of acknowledging the client (rather than praising)?',
    opts: ['“Great job, you’re so smart!”', '“You’ve stayed with a hard question and found something that matters to you.”', '“That’s the best answer I’ve heard.”', '“I’m proud of you.”'],
    ans: 1,
    why: 'Acknowledgement reflects the client’s effort, values or work in their own terms; praise evaluates from the coach’s standpoint and centres the coach’s judgment.',
    cite: 'CC4 Cultivates Trust & Safety' },
  { id: 'C29', d: 'cmp', sub: 'Avoiding leading questions', diff: 2,
    stem: 'Which is a leading question that coaching seeks to avoid?',
    opts: ['“What matters to you about this?”', '“Don’t you think you should just talk to your boss?”', '“What options are you seeing?”', '“What would success look like?”'],
    ans: 1,
    why: 'A leading question embeds the coach’s answer (“…you should just talk to your boss”); open, non-leading questions invite the client’s own thinking.',
    cite: 'CC7 Evokes Awareness' },
  { id: 'C30', d: 'cmp', sub: 'Avoiding stacked questions', diff: 2,
    stem: 'Why does asking several questions in quick succession weaken coaching?',
    opts: ['It shows enthusiasm', 'It crowds the client’s thinking and reduces space to reflect and respond', 'It is faster and therefore better', 'It demonstrates the coach’s expertise'],
    ans: 1,
    why: 'Stacking questions overwhelms the client and removes reflective space; the competency calls for one clear question at a time at a reflective pace.',
    cite: 'CC7 Evokes Awareness' },
  { id: 'C31', d: 'cmp', sub: 'Client’s language', diff: 2,
    stem: 'Reflecting a client’s exact word back to them (rather than a synonym) helps because it:',
    opts: ['Shows the coach’s vocabulary', 'Stays true to the client’s meaning and can deepen their exploration', 'Speeds the session up', 'Corrects the client’s wording'],
    ans: 1,
    why: 'Using the client’s own words honours their meaning and supports self-expression; substituting synonyms can subtly reinterpret and pull them off their thread.',
    cite: 'CC6 Listens Actively' },
  { id: 'C32', d: 'cmp', sub: 'Contracting logistics', diff: 1,
    stem: 'Which of these belongs in the overall coaching agreement?',
    opts: ['The client’s childhood history', 'Logistics such as scheduling, confidentiality, fees and how coaching works', 'A guaranteed outcome', 'The coach’s personal goals'],
    ans: 1,
    why: 'The overall agreement covers the parameters of the engagement — logistics, roles, confidentiality, fees and the nature of coaching.',
    cite: 'CC3 Establishes & Maintains Agreements' },
  { id: 'C33', d: 'cmp', sub: 'Presence & culture', diff: 3,
    stem: 'Being present with a client from a different cultural background calls on the coach to:',
    opts: ['Assume shared meanings', 'Stay open and curious, adapting to the client’s context rather than imposing assumptions', 'Coach exactly as with everyone else', 'Focus on the coach’s own frame'],
    ans: 1,
    why: 'Presence and a coaching mindset include cultural awareness — remaining open, flexible and curious about the client’s context and meaning.',
    cite: 'CC2/CC5' },
  { id: 'C34', d: 'cmp', sub: 'Perspectives', diff: 2,
    stem: 'Inviting a client to consider a situation from another viewpoint primarily serves to:',
    opts: ['Convince them they are wrong', 'Expand their awareness and open new possibilities', 'Delay the session', 'Introduce the coach’s opinion'],
    ans: 1,
    why: 'Supporting the client to view a situation from different perspectives is a core way of evoking awareness and widening options.',
    cite: 'CC7 Evokes Awareness' },

var storageOK = true;
try { localStorage.setItem(KEY + '.t', '1'); localStorage.removeItem(KEY + '.t'); }
catch (e) { storageOK = false; }

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(db)); }
  catch (e) { storageOK = false; }
}
function seed() {
  return {
    version: 1,
    rev: 1,
    device: uid(),
    created: todayKey(),
    settings: { trainingStart: null, targetApply: null, icfMember: null, theme: 'auto', lastBackup: null, a2hsDismissed: false },
    clients: [],
    sessions: [],
    mentor: [],
    exam: { attempts: [], active: null, stats: {} },
    leitner: {},
    runway: { steps: {} },
    learn: { read: {} }
  };
}
function migrate(d) {
  var out = seed();
  out.device = typeof d.device === 'string' ? d.device : out.device;
  out.created = isDate(d.created) ? d.created : out.created;
  out.rev = clampInt(d.rev, 1, 99, 1);
  var s = d.settings || {};
  out.settings.trainingStart = isDate(s.trainingStart) ? s.trainingStart : null;
  out.settings.targetApply = isDate(s.targetApply) ? s.targetApply : null;
  out.settings.icfMember = (s.icfMember === 'yes' || s.icfMember === 'no') ? s.icfMember : null;
  out.settings.theme = (s.theme === 'light' || s.theme === 'dark') ? s.theme : 'auto';
  out.settings.lastBackup = isDate(s.lastBackup) ? s.lastBackup : null;
  out.settings.a2hsDismissed = !!s.a2hsDismissed;
  var ids = {};
  out.clients = (Array.isArray(d.clients) ? d.clients : []).map(function (c) {
    var id = String(c && c.id ? c.id : uid());
    ids[id] = true;
    return {
      id: id,
      name: String(c && c.name ? c.name : 'Client').slice(0, 60),
      contact: String(c && c.contact ? c.contact : '').slice(0, 80),
      kind: c && c.kind === 'grp' ? 'grp' : 'ind',
      size: clampInt(c && c.size, 2, 99, 2),
      peer: !!(c && c.peer),
      start: isDate(c && c.start) ? c.start : todayKey(),
      end: isDate(c && c.end) ? c.end : null,
      notes: String(c && c.notes ? c.notes : '').slice(0, 400)
    };
  });
  out.sessions = (Array.isArray(d.sessions) ? d.sessions : []).filter(function (x) {
    return x && ids[x.clientId] && isDate(x.date);
  }).map(function (x) {
    return {
      id: String(x.id || uid()),
      clientId: String(x.clientId),
      date: x.date,
      min: clampInt(x.min, 1, 600, 60),
      paid: !!x.paid,
      note: String(x.note || '').slice(0, 200)
    };
  });
  out.mentor = (Array.isArray(d.mentor) ? d.mentor : []).filter(function (x) {
    return x && isDate(x.date);
  }).map(function (x) {
    return {
      id: String(x.id || uid()),
      date: x.date,
      min: clampInt(x.min, 1, 600, 60),
      solo: !!x.solo,
      mentorName: String(x.mentorName || '').slice(0, 60),
      note: String(x.note || '').slice(0, 200)
    };
  });
  var ex = d.exam || {};
  out.exam.attempts = (Array.isArray(ex.attempts) ? ex.attempts : []).slice(-100);
  out.exam.active = (ex.active && typeof ex.active === 'object') ? ex.active : null;
  out.exam.stats = (ex.stats && typeof ex.stats === 'object') ? ex.stats : {};
  out.leitner = (d.leitner && typeof d.leitner === 'object') ? d.leitner : {};
  out.runway.steps = (d.runway && d.runway.steps && typeof d.runway.steps === 'object') ? d.runway.steps : {};
  out.learn.read = (d.learn && d.learn.read && typeof d.learn.read === 'object') ? d.learn.read : {};
  return out;
}
function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (!raw) return null;
    var d = JSON.parse(raw);
    if (!d || typeof d !== 'object' || !d.settings) return null;
    return migrate(d);
  } catch (e) { return null; }
}

function clientById(id) {
  for (var i = 0; i < db.clients.length; i++) if (db.clients[i].id === id) return db.clients[i];
  return null;
}
function sessionById(id) {
  for (var i = 0; i < db.sessions.length; i++) if (db.sessions[i].id === id) return db.sessions[i];
  return null;
}
function mentorById(id) {
  for (var i = 0; i < db.mentor.length; i++) if (db.mentor[i].id === id) return db.mentor[i];
  return null;
}
function sessionBlockers(sess, client) {
  // why a session would not count toward ICF hours (empty array = counts)
  var out = [];
  var ts = db.settings.trainingStart;
  if (ts && sess.date < ts) out.push('pre');
  if (client && client.kind === 'grp' && client.size > 15) out.push('oversize');
  return out;
}
function hourStats() {
  var st = {
    paidMin: 0, proMin: 0, proCounted: 0, counted: 0,
    clientN: 0, winMin: 0,
    anchor: db.settings.targetApply || todayKey(),
    perClient: {}, excludedPre: 0, excludedOver: 0, warnings: []
  };
  st.winStart = monthsBack(st.anchor, 18);
  db.sessions.forEach(function (s) {
    var c = clientById(s.clientId);
    if (!c) return;
    var block = sessionBlockers(s, c);
    if (block.length) {
      if (block.indexOf('pre') >= 0) st.excludedPre++;
      else st.excludedOver++;
      return;
    }
    st.perClient[c.id] = (st.perClient[c.id] || 0) + s.min;
    if (s.paid) st.paidMin += s.min; else st.proMin += s.min;
    if (s.date > st.winStart && s.date <= st.anchor) st.winMin += s.min;
  });
  db.clients.forEach(function (c) {
    if (st.perClient[c.id] > 0) st.clientN += (c.kind === 'grp' ? c.size : 1);
  });
  st.proCounted = Math.min(st.proMin, 25 * 60);
  st.counted = st.paidMin + st.proCounted;
  if (db.sessions.length && !db.settings.trainingStart)
    st.warnings.push('Set your training start date in Setup below — ICF only counts hours coached after your coach education began.');
  if (st.excludedPre)
    st.warnings.push(st.excludedPre + ' session' + (st.excludedPre === 1 ? ' is' : 's are') + ' dated before your training start, so ' + (st.excludedPre === 1 ? 'it doesn’t' : 'they don’t') + ' count (kept in the log).');
  if (st.excludedOver)
    st.warnings.push(st.excludedOver + ' session' + (st.excludedOver === 1 ? '' : 's') + ' with a group over 15 participants can’t count toward ICF hours.');
  if (st.proMin > 25 * 60)
    st.warnings.push('You’ve logged ' + fmtH(st.proMin) + ' h pro bono — ICF counts at most 25 h; the rest of the 100 must be paid (barter and peer-reciprocal coaching count as paid).');
  if (db.settings.targetApply && db.settings.targetApply < todayKey())
    st.warnings.push('Your target application date is in the past — update it in Setup so the 18-month window is measured correctly.');
  return st;
}
function mentorStats() {
  var m = { min: 0, soloMin: 0, first: null, last: null, spanOk: false };
  db.mentor.forEach(function (e) {
    m.min += e.min;
    if (e.solo) m.soloMin += e.min;
    if (!m.first || e.date < m.first) m.first = e.date;
    if (!m.last || e.date > m.last) m.last = e.date;
  });
  if (m.first && m.last) m.spanOk = m.last >= monthsForward(m.first, 3);
  return m;
}

function ring(frac, size, stroke) {
  var r = (size - stroke) / 2;
  var c = 2 * Math.PI * r;
  var f = Math.max(0, Math.min(1, frac));
  var fill = f > 0
    ? '<circle class="ring-fill" cx="' + size / 2 + '" cy="' + size / 2 + '" r="' + r + '" stroke-width="' + stroke + '"' +
      ' stroke-dasharray="' + (c * f).toFixed(1) + ' ' + c.toFixed(1) + '"' +
      ' transform="rotate(-90 ' + size / 2 + ' ' + size / 2 + ')"/>'
    : '';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" aria-hidden="true" style="flex:none">' +
    '<circle class="ring-track" cx="' + size / 2 + '" cy="' + size / 2 + '" r="' + r + '" stroke-width="' + stroke + '"/>' +
    fill +
    '</svg>';
}
function tile(val, label, sub, met, frac, barCls) {
  var barH = (typeof frac === 'number')
    ? '<div class="bar"><i' + (barCls ? ' class="' + barCls + '"' : '') + ' style="width:' + Math.min(100, Math.round(frac * 100)) + '%"></i></div>'
    : '';
  return '<div class="tile card' + (met ? ' met' : '') + '">' +
    '<div class="tile-v">' + val + (met ? SVG_CHECK16 : '') + '</div>' +
    '<div class="tile-l">' + label + '</div>' +
    (sub ? '<div class="tile-s">' + sub + '</div>' : '') +
    barH + '</div>';
}
function miniSeg(pairs, act, current) {
  return '<div class="seg">' + pairs.map(function (p) {
    return '<button data-act="' + act + '" data-v="' + p[0] + '" class="' + (String(current) === String(p[0]) ? 'on' : '') + '">' + p[1] + '</button>';
  }).join('') + '</div>';
}
function vStub(title, blurb) {
  return '<h1 class="view-title">' + title + '</h1>' +
    '<div class="card empty"><p>' + blurb + '</p></div>';
}

var LEIT_INT = [1, 2, 5, 10, 21];
function leitState(id) { return db.leitner[id] || { box: 1, due: db.created }; }
function leitDueIds() {
  var t = todayKey();
  return AVOID.filter(function (a) { var c = db.leitner[a.id]; return !c || c.due <= t; }).map(function (a) { return a.id; });
}
function leitBoxes() {
  var b = [0, 0, 0, 0, 0];
  AVOID.forEach(function (a) { b[leitState(a.id).box - 1]++; });
  return b;
}
function leitGrade(id, good) {
  var c = db.leitner[id] || { box: 1, due: todayKey() };
  if (good) { c.box = Math.min(5, c.box + 1); c.due = addDays(todayKey(), LEIT_INT[c.box - 1]); }
  else { c.box = 1; c.due = addDays(todayKey(), 1); }
  db.leitner[id] = c;
  save();
}
function flashCards() {
  var out = [];
  QB.sections.forEach(function (s) {
    (s.groups || []).forEach(function (g) {
      if (g.card) out.push({ sec: s.title, n: s.n, scenario: g.card, items: g.items, label: g.label || null });
    });
  });
  return out;
}
function qtext(s) {
  return esc(s).replace(/\[([^\]]+)\]/g, '<span class="bracket">[$1]</span>');
}
function sectionById(id) {
  for (var i = 0; i < QB.sections.length; i++) if (QB.sections[i].id === id) return QB.sections[i];
  return null;
}

function itemHTML(it) {
  var h = '';
  if (it.lead) h += '<span class="qlead">' + esc(it.lead) + ' — </span>';
  h += qtext(it.q);
  if (it.note) h += ' <span class="qnote">(' + esc(it.note) + ')</span>';
  if (it.tonal) h += '<span class="tonal">tonal care</span>';
  return h;
}
function groupHTML(g) {
  var h = '';
  if (g.label) h += '<div class="glabel">' + esc(g.label) + '</div>';
  if (g.note) h += '<p class="srcnote">' + esc(g.note) + '</p>';
  if (g.ordered) {
    h += '<ol class="card qlist" style="margin:8px 0 0;padding:6px 16px 6px 32px">' + g.items.map(function (it) {
      return '<li style="padding:6px 2px;font-size:14.5px;line-height:1.55">' + itemHTML(it) + '</li>';
    }).join('') + '</ol>';
  } else {
    h += '<div class="card qlist" style="margin-top:8px">' + g.items.map(function (it) {
      return '<div class="qrow">' + itemHTML(it) + '</div>';
    }).join('') + '</div>';
  }
  return h;
}

        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, '’')
        .replace(/\s+/g, ' ').trim();

function learnResultsHTML(q) {
  q = (q || '').trim();
  if (q.length < 3) return q.length ? '<p class="note">Keep typing — three letters or more.</p>' : '';
  var ql = q.toLowerCase();
  var rows = [];
  learnIndex().some(function (e) {
    var pos = e.low.indexOf(ql);
    if (pos === -1) return false;
    var count = 0, at = pos;
    while (at !== -1 && count < 100) { count++; at = e.low.indexOf(ql, at + ql.length); }
    var start = Math.max(0, pos - 45);
    var end = Math.min(e.text.length, pos + ql.length + 65);
    var snip = (start > 0 ? '…' : '') + esc(e.text.slice(start, pos)) +
      '<mark>' + esc(e.text.slice(pos, pos + ql.length)) + '</mark>' +
      esc(e.text.slice(pos + ql.length, end)) + (end < e.text.length ? '…' : '');
    rows.push('<button class="sres" data-act="learn-doc" data-id="' + e.mod + '" data-i="' + e.i + '" data-hl="1">' +
      '<span class="sres-t">' + esc(e.title) + ' <span class="sub" style="font-weight:400">· ' + esc(e.mod === 'IW' ? 'Integration weeks' : e.mod === 'PROG' ? 'Programme' : e.mod) + ' · ' + count + (count === 100 ? '+' : '') + ' match' + (count === 1 ? '' : 'es') + '</span></span>' +
      '<span class="sres-s">' + snip + '</span></button>');
    return rows.length >= 30;
  });
  if (!rows.length) return '<p class="note">No matches for “' + esc(q) + '” across the materials.</p>';
  return '<div class="card qlist" style="margin-top:10px">' + rows.join('') + '</div>';
}
function hlDoc(q) {
  q = (q || '').trim();
  if (q.length < 3) return;
  var root = document.querySelector('#view .doc');
  if (!root) return;
  var ql = q.toLowerCase();
  var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  var nodes = [], n;
  while ((n = walker.nextNode())) if (n.nodeValue.toLowerCase().indexOf(ql) !== -1) nodes.push(n);
  nodes.forEach(function (tn) {
    var text = tn.nodeValue, lower = text.toLowerCase();
    var frag = document.createDocumentFragment();
    var idx = 0, pos;
    while ((pos = lower.indexOf(ql, idx)) !== -1) {
      frag.appendChild(document.createTextNode(text.slice(idx, pos)));
      var mk = document.createElement('mark');
      mk.textContent = text.slice(pos, pos + ql.length);
      frag.appendChild(mk);
      idx = pos + ql.length;
    }
    frag.appendChild(document.createTextNode(text.slice(idx)));
    tn.parentNode.replaceChild(frag, tn);
  });
  var first = root.querySelector('mark');
  if (first) setTimeout(function () { first.scrollIntoView({ block: 'center' }); }, 40);
}

/* ── exam engine ─────────────────────────────────────────────────────── */
var DOM_LABEL = { eth: 'Ethics', bnd: 'Definition & Boundaries', cmp: 'Competencies & Skills' };
var DOM_SHORT = { eth: 'Ethics', bnd: 'Boundaries', cmp: 'Competencies' };
var MOCK_QUOTA = { eth: 18, bnd: 18, cmp: 24 };
function examQ(id) { for (var i = 0; i < EXAM_BANK.length; i++) if (EXAM_BANK[i].id === id) return EXAM_BANK[i]; return null; }
function lastSeenKey(q) { var s = db.exam.stats[q.id]; return (s && s.last) ? s.last : '0000-00-00'; }
function weakestDomain() {
  var best = null, bestAcc = 2;
  ['eth', 'bnd', 'cmp'].forEach(function (d) {
    var seen = 0, ok = 0;
    EXAM_BANK.forEach(function (q) { if (q.d === d) { var s = db.exam.stats[q.id]; if (s && s.seen) { seen += s.seen; ok += s.ok; } } });
    var acc = seen ? ok / seen : 1.01; // unseen domains rank as "known" so weakness reflects real misses
    if (acc < bestAcc) { bestAcc = acc; best = d; }
  });
  return best || 'eth';
}
function sampleMock() {
  var lastMock = null;
  for (var i = db.exam.attempts.length - 1; i >= 0; i--) { if (db.exam.attempts[i].mode === 'mock') { lastMock = db.exam.attempts[i]; break; } }
  var exclude = {};
  if (lastMock && lastMock.qids) lastMock.qids.forEach(function (id) { exclude[id] = 1; });
  var pick = [];
  ['eth', 'bnd', 'cmp'].forEach(function (d) {
    var pool = EXAM_BANK.filter(function (q) { return q.d === d; });
    var fresh = shuffle(pool.filter(function (q) { return !exclude[q.id]; }));
    var rest = shuffle(pool.filter(function (q) { return exclude[q.id]; }));
    fresh.sort(function (a, b) { var x = lastSeenKey(a), y = lastSeenKey(b); return x < y ? -1 : x > y ? 1 : 0; });
    pick = pick.concat(fresh.concat(rest).slice(0, MOCK_QUOTA[d]));
  });
  return shuffle(pick).map(function (q) { return q.id; });
}
function startMock(timed) {
  db.exam.active = {
    mode: 'mock', timed: !!timed, qids: sampleMock(), answers: {}, flags: {},
    section: 1, cursor: 0, secEndsAt: timed ? Date.now() + SEC_MS : null,
    breakEndsAt: null, break: false, startedAt: Date.now()
  };
  save();
  view.exam.screen = 'run';
  render();
  window.scrollTo(0, 0);
}
function resumeExam() {
  var a = db.exam.active;
  if (!a) { view.exam.screen = 'home'; render(); return; }
  if (a.break) { view.exam.screen = 'break'; render(); return; }
  view.exam.screen = 'run';
  if (a.timed && a.secEndsAt && Date.now() >= a.secEndsAt) { render(); submitSection(true); return; }
  render();
  window.scrollTo(0, 0);
}
function submitSection(auto) {
  var a = db.exam.active;
  if (!a) return;
  if (a.section === 1) {
    a.break = true;
    a.breakEndsAt = a.timed ? Date.now() + BREAK_MS : null;
    save();
    view.exam.screen = 'break';
    render();
    window.scrollTo(0, 0);

  } else {
    if (auto) toast('Section 2 — time called');

  }
}
function startSection2() {
  var a = db.exam.active;
  if (!a) return;
  a.section = 2;
  a.cursor = 0;
  a.break = false;
  a.secEndsAt = a.timed ? Date.now() + SEC_MS : null;
