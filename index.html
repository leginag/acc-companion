<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ACC Companion</title>
<meta name="description" content="ICF ACC prep — practise drills, competency criteria, exam mocks and the 100-hour log. Data stays on your device.">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f4f0">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1310">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ACC">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<style>
  /* ── tokens ──────────────────────────────────────────────────────────── */
  :root {
    --bg: #f1f4f0;
    --surface: #ffffff;
    --surface-2: #f4f7f3;
    --sheet: #ffffff;
    --ink: #182119;
    --ink-2: #45544a;
    --muted: #66756b;
    --hairline: rgba(24, 33, 25, .12);
    --track: #e4eae3;
    --accent: #1c8158;
    --accent-strong: #245f45;
    --on-accent: #ffffff;
    --accent-tint: #e5f0e9;
    --p2: #2a78d6;
    --p2-strong: #1c5cab;
    --p2-tint: #e3eefb;
    --amber-tint: #f7ecd6;
    --amber-ink: #8a5a12;
    --danger: #bf3a2e;
    --danger-tint: #f9e7e4;
    --nav-bg: rgba(252, 253, 252, .86);
    --scrim: rgba(18, 26, 20, .42);
    --shadow: 0 1px 2px rgba(24, 33, 25, .05), 0 4px 16px rgba(24, 33, 25, .06);
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-round: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1310;
      --surface: #1a211c;
      --surface-2: #232c26;
      --sheet: #212a24;
      --ink: #e9efe9;
      --ink-2: #b6c2b9;
      --muted: #8b9a90;
      --hairline: rgba(233, 239, 233, .10);
      --track: #2c362f;
      --accent: #35a474;
      --accent-strong: #7ed3ab;
      --on-accent: #07130c;
      --accent-tint: rgba(53, 164, 116, .16);
      --p2: #3987e5;
      --p2-strong: #86b6ef;
      --p2-tint: rgba(57, 135, 229, .17);
      --amber-tint: rgba(235, 170, 80, .15);
      --amber-ink: #e8b45c;
      --danger: #e0705f;
      --danger-tint: rgba(224, 112, 95, .14);
      --nav-bg: rgba(19, 25, 21, .86);
      --scrim: rgba(0, 0, 0, .55);
      --shadow: 0 1px 2px rgba(0, 0, 0, .25), 0 4px 16px rgba(0, 0, 0, .30);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0e1310;
    --surface: #1a211c;
    --surface-2: #232c26;
    --sheet: #212a24;
    --ink: #e9efe9;
    --ink-2: #b6c2b9;
    --muted: #8b9a90;
    --hairline: rgba(233, 239, 233, .10);
    --track: #2c362f;
    --accent: #35a474;
    --accent-strong: #7ed3ab;
    --on-accent: #07130c;
    --accent-tint: rgba(53, 164, 116, .16);
    --p2: #3987e5;
    --p2-strong: #86b6ef;
    --p2-tint: rgba(57, 135, 229, .17);
    --amber-tint: rgba(235, 170, 80, .15);
    --amber-ink: #e8b45c;
    --danger: #e0705f;
    --danger-tint: rgba(224, 112, 95, .14);
    --nav-bg: rgba(19, 25, 21, .86);
    --scrim: rgba(0, 0, 0, .55);
    --shadow: 0 1px 2px rgba(0, 0, 0, .25), 0 4px 16px rgba(0, 0, 0, .30);
  }
  :root[data-theme="light"] {
    --bg: #f1f4f0;
    --surface: #ffffff;
    --surface-2: #f4f7f3;
    --sheet: #ffffff;
    --ink: #182119;
    --ink-2: #45544a;
    --muted: #66756b;
    --hairline: rgba(24, 33, 25, .12);
    --track: #e4eae3;
    --accent: #1c8158;
    --accent-strong: #245f45;
    --on-accent: #ffffff;
    --accent-tint: #e5f0e9;
    --p2: #2a78d6;
    --p2-strong: #1c5cab;
    --p2-tint: #e3eefb;
    --amber-tint: #f7ecd6;
    --amber-ink: #8a5a12;
    --danger: #bf3a2e;
    --danger-tint: #f9e7e4;
    --nav-bg: rgba(252, 253, 252, .86);
    --scrim: rgba(18, 26, 20, .42);
    --shadow: 0 1px 2px rgba(24, 33, 25, .05), 0 4px 16px rgba(24, 33, 25, .06);
  }

  /* ── base ────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html { background: var(--bg); }
  html.locked { overflow: hidden; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:disabled { cursor: default; }
  :focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; border-radius: 6px; }
  svg { display: block; }

  #app {
    max-width: 520px;
    margin: 0 auto;
    padding: 14px 14px calc(96px + env(safe-area-inset-bottom, 0px));
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .sub { font-size: 13px; color: var(--muted); }
  .h-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 2px 8px;
  }
  .view-title {
    margin: 6px 2px 4px;
    font-family: var(--font-round);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .view-sub { margin: 0 2px 14px; font-size: 13.5px; color: var(--muted); line-height: 1.5; }
  .subhead { display: flex; align-items: center; gap: 10px; margin: 6px 0 12px; }
  .subhead h1 { margin: 0; font-family: var(--font-round); font-size: 20px; font-weight: 700; flex: 1; min-width: 0; }
  .subhead .sub { display: block; }
  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink-2);
    background: var(--surface);
    border: 1px solid var(--hairline);
    flex: none;
  }

  #banner {
    background: var(--amber-tint);
    color: var(--amber-ink);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13.5px;
    margin-bottom: 12px;
  }
  #installbar {
    display: flex; align-items: center; gap: 10px;
    background: var(--accent-tint);
    color: var(--ink);
    border-radius: 12px;
    padding: 10px 12px 10px 14px;
    font-size: 13px; line-height: 1.4;
    margin-bottom: 12px;
  }
  #installbar span { flex: 1; }
  #installbar button {
    flex: none;
    font-size: 13px; font-weight: 700;
    color: var(--accent-strong);
    padding: 6px 10px; border-radius: 8px;
  }

  .empty { padding: 26px 20px; text-align: center; }
  .empty p { color: var(--muted); margin: 0 0 14px; font-size: 14.5px; line-height: 1.55; }
  .empty p:last-child { margin-bottom: 0; }

  /* ── seg control ─────────────────────────────────────────────────────── */
  .seg {
    display: flex;
    gap: 3px;
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-radius: 13px;
    padding: 3px;
  }
  .seg button {
    flex: 1;
    min-height: 38px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 10px;
  }
  .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }

  /* ── hero & tiles ────────────────────────────────────────────────────── */
  .hero { display: flex; align-items: center; gap: 16px; padding: 16px; margin-bottom: 10px; }
  .sum-big { font-family: var(--font-round); font-size: 22px; font-weight: 700; line-height: 1.2; }
  .ring-track { fill: none; stroke: var(--track); }
  .ring-fill { fill: none; stroke: var(--accent); stroke-linecap: round; transition: stroke-dasharray .45s cubic-bezier(.22, .9, .36, 1); }
  .tiles2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tile { padding: 12px 12px 10px; text-align: left; min-width: 0; }
  .tile-v { font-family: var(--font-round); font-size: 20px; font-weight: 700; line-height: 1.15; display: flex; align-items: center; gap: 6px; }
  .tile-v small { font-size: 13px; font-weight: 600; color: var(--muted); }
  .tile-l { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .tile-s { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .tile.met .tile-v { color: var(--accent-strong); }
  .tile .bar { margin-top: 8px; }
  .bar { height: 5px; border-radius: 3px; background: var(--track); overflow: hidden; }
  .bar i {
    display: block; height: 100%;
    background: var(--accent); border-radius: 3px;
    transition: width .35s cubic-bezier(.22, .9, .36, 1);
  }
  .bar i.p2f { background: var(--p2); }
  .bar i.amberf { background: var(--amber-ink); }

  /* ── rows & pills ────────────────────────────────────────────────────── */
  .rows { display: flex; flex-direction: column; gap: 8px; }
  .mrow {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    text-align: left;
  }
  .mrow-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .mrow-name { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mrow svg { color: var(--muted); flex: none; }
  .pillrow { display: flex; gap: 5px; flex: none; align-items: center; flex-wrap: wrap; justify-content: flex-end; max-width: 40%; }
  .pill { font-size: 11px; font-weight: 700; border-radius: 99px; padding: 2.5px 9px; white-space: nowrap; }
  .pill.paid { background: var(--accent-tint); color: var(--accent-strong); }
  .pill.pro { background: var(--p2-tint); color: var(--p2-strong); }
  .pill.peer { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--hairline); }
  .pill.warn { background: var(--amber-tint); color: var(--amber-ink); }
  .pill.bad { background: var(--danger-tint); color: var(--danger); }
  .chip {
    background: var(--amber-tint); color: var(--amber-ink);
    font-size: 12.5px; font-weight: 700;
    border-radius: 99px; padding: 3px 9px;
    flex: none;
  }

  /* ── buttons & forms ─────────────────────────────────────────────────── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 48px;
    border-radius: 14px;
    font-weight: 600; font-size: 15px;
    padding: 0 16px;
  }
  .btn-primary { background: var(--accent); color: var(--on-accent); }
  .btn-surface { background: var(--surface); border: 1px solid var(--hairline); color: var(--ink-2); box-shadow: var(--shadow); }
  .btn-ghost { color: var(--ink-2); }
  .btn-danger { color: var(--danger); font-weight: 600; }
  .btn-danger.armed { background: var(--danger); color: #fff; border-radius: 14px; padding: 0 16px; }
  .btn-add { width: 100%; margin-top: 10px; }
  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .f-err { color: var(--danger); font-size: 13px; margin: 6px 2px; }
  .f-ok { color: var(--accent-strong); font-size: 13px; margin: 6px 2px; }
  .f-warn { color: var(--amber-ink); background: var(--amber-tint); border-radius: 10px; padding: 8px 12px; font-size: 13px; margin: 8px 0; line-height: 1.5; }
  .note { font-size: 12.5px; color: var(--muted); margin: 10px 4px 0; line-height: 1.5; }
  .addmiss { display: flex; gap: 9px; align-items: flex-start; font-size: 13.5px; color: var(--ink-2); margin: 12px 2px; line-height: 1.45; }
  .addmiss input { width: 18px; height: 18px; flex: none; margin: 1px 0 0; accent-color: var(--accent); }
  .confirm-import { padding: 14px; margin-top: 10px; background: var(--surface); }
  .confirm-import p { margin: 0 0 12px; font-size: 14px; color: var(--ink-2); }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .erase-wrap { margin-top: 22px; display: flex; justify-content: center; }
  .erase-wrap .btn { min-height: 44px; font-size: 14px; }
  .f-label {
    display: block;
    font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    margin: 16px 2px 7px;
  }
  .f-input {
    width: 100%;
    font: inherit; font-size: 16px;
    color: var(--ink);
    background: var(--surface-2);
    border: 1.5px solid var(--hairline);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .f-input:focus { outline: none; border-color: var(--accent); }
  .f-input.num { font-family: var(--font-round); font-weight: 700; font-variant-numeric: tabular-nums; }
  select.f-input { -webkit-appearance: none; appearance: none; }
  .num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .chips button {
    border: 1.5px solid var(--hairline); border-radius: 99px;
    padding: 7px 13px; font-weight: 600; font-size: 13.5px;
    background: var(--surface-2); color: var(--ink-2);
  }

  /* ── setup rows ──────────────────────────────────────────────────────── */
  .setup { overflow: hidden; }
  .srow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 14px; }
  .srow + .srow { border-top: 1px solid var(--hairline); }
  .srow-l { font-weight: 600; font-size: 14px; }
  .srow-l .sub { font-weight: 400; margin-top: 1px; }
  .srow .f-input.compact { width: 168px; padding: 8px 10px; font-size: 14px; flex: none; }
  .srow .seg { flex: none; width: 190px; margin: 0; }
  .srow .seg button { min-height: 32px; font-size: 12.5px; padding: 0 6px; }

  /* ── practise / question bank ────────────────────────────────────────── */
  .qrow { padding: 11px 14px; font-size: 14.5px; line-height: 1.55; }
  .qrow + .qrow { border-top: 1px solid var(--hairline); }
  .qlist { overflow: hidden; }
  .bracket { color: var(--accent-strong); font-weight: 600; font-style: italic; }
  .qlead { color: var(--p2-strong); font-style: italic; font-weight: 600; }
  .qnote { color: var(--muted); font-size: 13px; }
  .tonal { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .04em; border-radius: 99px; padding: 1.5px 7px; background: var(--amber-tint); color: var(--amber-ink); vertical-align: 2px; margin-left: 6px; white-space: nowrap; }
  .srcnote { font-size: 12px; color: var(--muted); font-style: italic; margin: 8px 2px 0; line-height: 1.5; }
  .glabel { font-weight: 700; font-size: 13px; margin: 16px 2px 6px; color: var(--ink-2); }
  .flash { padding: 20px 18px; min-height: 190px; display: flex; flex-direction: column; }
  .flash-k { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .flash-p { font-size: 17px; line-height: 1.5; font-weight: 600; flex: 1; }
  .flash-r { font-size: 14.5px; line-height: 1.55; }
  .smove { display: flex; gap: 12px; padding: 13px 14px; align-items: flex-start; }
  .smove + .smove { border-top: 1px solid var(--hairline); }
  .smove-n { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-tint); color: var(--accent-strong); font-weight: 700; font-size: 13px; display: grid; place-items: center; flex: none; margin-top: 1px; }
  .smove-t { font-weight: 700; font-size: 14px; }
  .smove-d { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; margin-top: 2px; }
  .leitbar { display: flex; gap: 4px; margin-top: 10px; }
  .leitbar span { flex: 1; height: 6px; border-radius: 3px; background: var(--track); }
  .leitbar span.f1 { background: var(--danger); }
  .leitbar span.f2 { background: var(--amber-ink); }
  .leitbar span.f3, .leitbar span.f4 { background: var(--p2); }
  .leitbar span.f5 { background: var(--accent); }

  /* ── learn / reader ──────────────────────────────────────────────────── */
  .learn-prog { display: flex; align-items: center; gap: 14px; padding: 14px; }
  .modchip {
    width: 44px; height: 44px; border-radius: 12px; flex: none;
    background: var(--accent-tint); color: var(--accent-strong);
    display: grid; place-items: center;
    font-family: var(--font-round); font-weight: 700; font-size: 13px;
  }
  .modchip.extra { background: var(--p2-tint); color: var(--p2-strong); }
  .modchip.done { background: var(--accent); color: var(--on-accent); }
  .doc { font-size: 15px; line-height: 1.62; }
  .doc > :first-child { margin-top: 0; }
  .doc h3 { font-family: var(--font-round); font-size: 18.5px; line-height: 1.3; margin: 26px 0 8px; }
  .doc h4 { font-family: var(--font-round); font-size: 16px; line-height: 1.35; margin: 22px 0 6px; }
  .doc h5, .doc h6 { font-size: 14px; letter-spacing: .01em; margin: 18px 0 4px; color: var(--ink-2); }
  .doc p { margin: 10px 0; }
  .doc ul, .doc ol { margin: 10px 0; padding-left: 22px; }
  .doc li { margin: 6px 0; }
  .doc blockquote {
    margin: 14px 0; padding: 10px 14px;
    border-left: 3px solid var(--accent);
    background: var(--accent-tint);
    border-radius: 0 12px 12px 0;
    font-size: 14.5px;
  }
  .doc blockquote p { margin: 4px 0; }
  .doc hr { border: 0; border-top: 1px solid var(--hairline); margin: 18px 0; }
  .doc a { color: var(--p2-strong); word-break: break-all; }
  .tblwrap { overflow-x: auto; margin: 14px -2px; -webkit-overflow-scrolling: touch; }
  .doc table { border-collapse: collapse; font-size: 13.5px; line-height: 1.5; min-width: 100%; }
  .doc th, .doc td { border: 1px solid var(--hairline); padding: 7px 10px; text-align: left; vertical-align: top; min-width: 90px; }
  .doc th { background: var(--surface-2); font-weight: 700; }
  .readbtn { display: flex; align-items: center; gap: 8px; }
  .readbtn.on { color: var(--accent-strong); }

  /* ── competencies ────────────────────────────────────────────────────── */
  .cc-dom { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--p2-strong); }
  .goodlist, .badlist { margin: 6px 0 4px; padding-left: 20px; }
  .goodlist li, .badlist li { font-size: 14px; line-height: 1.5; margin: 7px 0; }
  .goodlist li::marker { color: var(--accent); }
  .badlist li::marker { color: var(--danger); }

  /* ── exam ────────────────────────────────────────────────────────────── */
  .exam-top {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--bg);
    padding: 8px 2px;
    margin: -6px 0 8px;
  }
  .exam-top .sub { font-weight: 600; }
  #clock {
    font-family: var(--font-round); font-weight: 700; font-size: 17px;
    font-variant-numeric: tabular-nums;
    padding: 4px 12px; border-radius: 99px;
    background: var(--surface); border: 1px solid var(--hairline);
  }
  #clock.low { background: var(--amber-tint); color: var(--amber-ink); border-color: transparent; }
  .qstem { font-size: 15.5px; line-height: 1.55; margin: 8px 2px 4px; }
  .opt {
    display: flex; gap: 10px; width: 100%; text-align: left;
    padding: 12px 14px; margin-top: 8px;
    border: 1.5px solid var(--hairline); border-radius: 14px;
    background: var(--surface);
    font-size: 14.5px; line-height: 1.5;
    align-items: flex-start;
  }
  .opt .ol { font-weight: 700; color: var(--muted); flex: none; }
  .opt.sel { border-color: var(--accent); background: var(--accent-tint); }
  .opt.sel .ol { color: var(--accent-strong); }
  .opt.correct { border-color: var(--accent); background: var(--accent-tint); }
  .opt.wrong { border-color: var(--danger); background: var(--danger-tint); }
  .opt .om { flex: none; margin-left: auto; font-weight: 700; font-size: 12px; align-self: center; }
  .opt.correct .om { color: var(--accent-strong); }
  .opt.wrong .om { color: var(--danger); }
  .qnav { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
  .qnav .spacer { flex: 1; }

            { q: 'What have you learned about yourself in situations like this?' },
            { q: 'Take your time. What else is there?' }
          ] },
        { label: 'Offering a tentative perception', note: 'presence, held lightly; M05 Workbook', items: [
          { q: 'I think I may be noticing something shifting for you. Does that mean anything?', tonal: true },
          { q: 'Something seemed to change as you said that. Is there something you want to look at there?' }
        ] }
      ] },

    { id: 's5', n: 5, kind: 'phase', title: 'Generating Possibilities', source: 'M05 Workbook, Phase 5; M10 Workbook.',
      intro: 'The coach’s discipline here is not suggesting; possibilities carry the coachee’s thinking, not yours. “What might become possible?” keeps the field open; “What could you do?” tilts toward action too early.',
      groups: [
        { card: 'The coachee is ready to open up options. How do you widen the field without slipping into suggesting?',
          items: [
            { q: 'What might become possible from here?' },
            { q: 'What else? / What else might be possible?' },
            { q: 'What would you consider if nothing was in the way?' },
            { q: 'Of everything you have mentioned, what feels most resonant? / what feels most alive for you?' },
            { q: 'What is one move you could make from here?' },
            { q: 'What is the step that would mean something?' },
            { q: 'What would be different if [their wish] were already here?' },
            { q: 'How would you describe the situation once it’s resolved?' },
            { q: 'What are the benefits? What are the benefits for others? What are the costs?' },
            { q: 'What is getting in the way of [their wish]?' },
            { q: 'What do you already know about how to move forward?', tonal: true },
            { q: 'What resources do you have available that you have not named yet?', tonal: true },
            { q: 'Who can help you?' }
          ] },
        { label: 'Reformulating instead of suggesting', note: 'M10 Workbook. Where you feel “Have you considered speaking to them?” forming, and the coachee has already raised the conversation themselves, ask instead:', items: [
          { q: 'Regarding your wanting to have a conversation, what possibilities would open up as a result?' },
          { q: 'How does that sit with what you set out to do today?', note: 'later' }
        ] }
      ] },

    { id: 's6', n: 6, kind: 'phase', title: 'Committing to Action', source: 'M10 Workbook; M05 Handout Category 5.',
      intro: 'As commitment nears, the grammar turns from “would” to “will”. Not every conversation needs this phase; an inward action (a chosen noticing) counts.',
      groups: [
        { card: 'The coachee is ready to commit. How do you help them name a real next step — theirs, not yours?',
          items: [
            { q: 'What will you do?' },
            { q: 'When are you going to do it?' },
            { q: 'What is your next step toward [their wish]?' },
            { q: 'What, if any, obstacles might get in the way of [their committed action]?', note: 'after a commitment is made' },
            { q: 'What might get in the way, that would be worth speaking about before we close?' },
            { q: 'What do you have to draw on as you go?' },
            { q: 'Given that, what feels like the first thing you want to do?', note: 'M10 Handout' }
          ] },
        { label: 'Commitment language', note: 'reflect, don’t police', items: [
          { q: 'I notice you said “I’ll try”. What does “try” mean for you here?' },
          { q: 'I noticed you said you have to. I am curious, what would happen if you said what you want?' },
          { q: 'Have to, or want to?', note: 'light closed question, offered without weight' }
        ] },
        { label: 'When the coachee over-commits', items: [
          { q: 'Of the things you have named, which feel most alive and most doable for you today?' }
        ] },
        { label: 'When the outcome is the insight itself', items: [
          { q: 'With what you have seen today, what might you start to notice between now and when we next meet?' },
          { q: 'What would help you stay close to this in the coming days?' }
        ] }
      ] },

    { id: 's7', n: 7, kind: 'closure', title: 'The Close', sub: 'four-part protocol', source: 'M05 Handout Category 6; M10 Workbook, “A shape for the close”.',
      intro: 'A conversation does not stop, it closes, with the coachee owning the close. Signal it before you reach it; attention to time across the whole session makes this possible.',
      groups: [
        { label: 'The four-part closure protocol', ordered: true,
          card: 'Time is nearly up. What are the four moves of a clean close that leaves the coachee owning it?',
          items: [
            { q: 'Signal the close in advance: “We are now about ready to conclude this session.” / “We are coming towards the end of our time today.”' },
            { q: 'Hand the closure to the coachee: “How would you like to close this session?”' },
            { q: 'Invite anything outstanding: “Is there anything you would like to add before we close?”' },
            { q: 'Appreciation: thank the coachee for their work and time. Acknowledgement grounded in their words, not praise — e.g. “When we began, you told me how much this mattered to you. Hearing you now, I have the sense that it still does.”' }
          ] },
        { label: 'Harvest questions that belong here', items: [
          { q: 'As we come towards the end, what stands out for you?' },
          { q: 'What is the most important thing you’re taking from this conversation?' },
          { q: 'What have you learned about your situation?' },
          { q: 'What have you learned about yourself?' },
          { q: 'What is becoming clearer?' },
          { q: 'What do you want to do with what we’ve explored?' },
          { q: 'Is there a declaration you would like to make?', tonal: true },
          { q: 'Is there something you want to say that hasn’t been said before we close?', tonal: true }
        ] }
      ],
      outro: 'Receive the answers without adding, summarising, or evaluating. The simplest close, from Module 4, remains valid: “What are you taking from this?”' },

    { id: 's8', n: 8, kind: 'situation', title: 'When emotion arrives', source: 'M06 Workbook Part 2; M06 Participant Handout.',
      intro: 'Behaviours, not techniques: acknowledge in their word, allow what they are doing, ask permission to stay, get curious about the assessment underneath. Never name the emotion for them; the only emotion word you use is one they have already said (M08 bright line).',
      groups: [
        { card: 'Emotion has surfaced. The coachee said a feeling-word themselves. How do you stay with it without naming or fixing it?',
          items: [
            { q: 'You said the word frustrated. Tell me more about frustrated.' },
            { q: 'You used the word stuck. What is stuck for you here?' },
            { q: 'That word [their word] seems to matter. What does it carry for you?' },
            { q: 'Would it be useful to stay here for a moment?' },
            { q: 'Is this a place you want to spend some time, or would you rather move on?' },
            { q: 'Something just shifted as you said that. Would it be useful to slow down for a moment?' },
            { q: 'I noticed your voice changed. Is this a place you want to spend some time, or would you rather move on?' },
            { q: 'What is this telling you?' },
            { q: 'What does this mean to you? / How does this matter to you?' },
            { q: 'What is the emotion pointing toward?' },
            { q: 'I noticed that you shifted just then. Does that mean anything for you?' }
          ] },
        { label: 'Scope boundary sentence', note: 'when it exceeds coaching; M06', items: [
          { q: 'What you are bringing is bigger than what coaching is for. I am here. I am not going anywhere. I am not going to try to coach this. Would it be useful to talk about what kind of support you need?' }
        ] }
      ] },

    { id: 's9', n: 9, kind: 'situation', title: 'When the coachee says “I don’t know”', source: 'M09 Workbook.',
      intro: 'Usually the edge of thought, not a wall. First move: notice your own rescue impulse and don’t act on it. Listen to how it arrived before choosing.',
      groups: [
        { card: 'The coachee says “I don’t know.” Before you rescue — what are your options, depending on how it arrived?',
          items: [
            { lead: 'Genuine edge, slow and trailing', q: 'Leave the space — silence is the kindest response.' },
            { q: 'If you did know, what might it be?', note: 'hold lightly; it does not always open' },
            { q: 'What is the first thing that comes, even if it is only a hunch?' },
            { q: 'What makes this one hard to answer?' },
            { q: 'What is it like, not knowing here?' },
            { lead: 'Recurring at the same spot', q: 'I notice we arrive here each time. Would you like to stay with it, or leave it for now?' },
            { lead: 'If it is confusion, treat it as an emotion', q: 'It sounds like there is some confusion here. What is the confusion about?' },
            { lead: 'Normalising, owned and grounded', q: 'From where I sit, that was a large question, and not knowing is a legitimate response to it.' }
          ] }
      ],
      outro: 'Watch your motive: support helps them stay at the edge; reassurance offered to relieve your own discomfort hurries them past it.' },

    { id: 's10', n: 10, kind: 'situation', title: 'When the focus shifts mid-session', source: 'M09 Workbook.',
      intro: 'Make the shift visible; the coachee chooses.',
      groups: [
        { card: 'The conversation has drifted from what you agreed. How do you make the shift visible and let the coachee choose?',
          items: [
            { q: 'You started with [original focus], and something different has emerged. What feels most important to explore right now?' },
            { q: 'We could continue exploring this or go somewhere different. What feels right to you?' },
            { q: 'How would you like to use the time we have left?' }
          ] }
      ] },

    { id: 's11', n: 11, kind: 'situation', title: 'Offering an observation or a distinction', source: 'M08 Workbook and Handout.',
      intro: 'The six moves, in order. The offer ends in a question, never in “you are”.',
      protocol: [
        { move: 'Permission', line: 'May I offer something I’ve noticed? / May I share an impression I’m getting?' },
        { move: 'Grounding', line: 'I heard you say… (their words, not yours)' },
        { move: 'Ownership', line: 'I’m getting the sense that… / From where I sat, I saw…' },
        { move: 'Landing', line: 'How does that land for you?' },
        { move: 'Utility', line: 'Useful? In what way?' },
        { move: 'Release', line: 'If not useful, “alright”, and follow them. No defence, no second attempt.' }
      ],
      worked: 'From what you’re saying, the word unfair has come up three times, and your pace quickened. What do you make of that?',
      avoidExample: 'From what you’re saying… I get the idea… you seem angry.',
      distinctionNote: 'For a distinction: ask permission, define it in clear universal terms keeping the coachee’s story out, ask how it lands, ask whether it is useful and in what way, release if not (M08 Workbook; Coaching Feedback Companion).' },

    { id: 's12', n: 12, kind: 'situation', title: 'Monitoring at the start of a follow-up session', source: 'M10 Workbook.',
      intro: 'Curiosity, not appraisal; accountability sits with the coachee. Never open with “So, did you do it?”',
      groups: [
        { card: 'It’s a follow-up session. They committed to something last time. How do you open with curiosity, not appraisal?',
          items: [
            { q: 'How have things gone since we last spoke?' },
            { q: 'What did you take from doing it?', note: 'if they followed through, after appreciating the follow-through' },
            { q: 'What got in the way?', note: 'if they did not; without judgement; an action not taken holds as much learning' },
            { q: 'What are you learning?' },
            { q: 'Thank you for sharing that. What would you like to focus on today?' }
          ] }
      ] },

    { id: 's13', n: 13, kind: 'situation', title: 'Designing a conversation about a relationship', sub: 'five territories', source: 'M07 Question Set.',
      intro: 'For when the coachee wants to improve a relationship of their own choosing. Route: understand the judgement, see the other’s side, recognise the value, define new opinions from the same facts, redefine toward a clear request and offer.',
      groups: [
        { label: 'Judgement', items: [
          { q: 'What do you think of this person? How would you describe them?' },
          { q: 'Have they done something that has made you feel hurt or upset?' },
          { q: 'When have you seen them act in the opposite way?' },
          { q: 'What has happened between you that stays with you?' }
        ] },
        { label: 'Perception', items: [
          { q: 'How do you think they perceive you?' },
          { q: 'Is there anything you would want to apologise for?' },
          { q: 'How do you think they feel about the relationship?' },
          { q: 'What might be driving how they act?' },
          { q: 'What might they be feeling toward you that you have not asked about?' }
        ] },
        { label: 'Value', items: [
          { q: 'What benefit do they bring to you, to others, to the work?' },
          { q: 'When has it worked well between you?' },
          { q: 'What do they do well?' },
          { q: 'What is worth protecting in this relationship?' }
        ] },
        { label: 'New interpretation', items: [
          { q: 'What else might explain how they act?' },
          { q: 'What other explanations could you have of the same situation?' },
          { q: 'What facts might you not have weighed?' },
          { q: 'If you assumed good intent, how would you read the same facts?' }
        ] },
        { label: 'Purpose', items: [
          { q: 'What would you like to ask?' },
          { q: 'What would you like to offer?' },
          { q: 'What commitment would you like to make?' }
        ] }
      ] }
  ]

  { id: 'E01', d: 'eth', sub: 'Confidentiality', diff: 1,
